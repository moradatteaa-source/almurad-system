<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗂️ الأرشيف الشهري - نظام المراد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #043B64;
      --orange: #FF6B2D;
      --bg: #f4f6fa;
      --card-bg: #fff;
      --shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Tajawal', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--blue);
    }

    header {
      background: var(--blue);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      box-shadow: var(--shadow);
    }

    header h2 {
      margin: 0;
      font-size: 20px;
    }

    .reset-btn {
      background: var(--orange);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .reset-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .container {
      padding: 25px;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .month-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
      cursor: pointer;
    }

    .month-card:hover {
      transform: translateY(-3px);
    }

    .month-header {
      font-size: 18px;
      font-weight: bold;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .month-stats {
      font-size: 14px;
      color: #333;
      line-height: 1.8;
    }

    .month-stats strong {
      color: var(--orange);
    }

    .details-btn {
      display: inline-block;
      margin-top: 10px;
      background: var(--blue);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .details-btn:hover {
      opacity: 0.9;
    }

    /* نافذة التفاصيل */
    .popup {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-shadow: var(--shadow);
      position: relative;
      overflow-y: auto;
      max-height: 90vh;
    }

    .popup h3 {
      margin-top: 0;
      color: var(--blue);
      font-size: 18px;
      border-bottom: 2px solid var(--orange);
      padding-bottom: 6px;
    }

    .close-popup {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--orange);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      header h2 { font-size: 18px; }
      .reset-btn { font-size: 13px; padding: 8px 16px; }
      .month-card { padding: 15px; }
      .month-header { font-size: 16px; }
    }
  </style>

function toEnglish(num) {
  if (num === undefined || num === null || isNaN(num)) return "0";
  return Number(num).toLocaleString('en-US');
}
// 🔠 فرض عرض الأرقام بالإنكليزي في النصوص داخل الصفحة

  return text.toString().replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));

async function loadArchivedMonths() {

`;

};

// ✅ كود نهائي: يحول كل الأرقام داخل الصفحة إلى إنكليزي بشكل مستمر
function convertArabicDigitsToEnglish(element) {
  const arabicDigits = "٠١٢٣٤٥٦٧٨٩";
  const englishDigits = "0123456789";
  if (element.nodeType === Node.TEXT_NODE) {
    element.textContent = element.textContent.replace(/[٠-٩]/g, d => englishDigits[arabicDigits.indexOf(d)]);
  } else {
    for (const child of element.childNodes) {
      convertArabicDigitsToEnglish(child);
    }
  }
}

// 🔁 مراقبة الصفحة وتحويل أي أرقام جديدة تلقائيًا
const observer = new MutationObserver(() => convertArabicDigitsToEnglish(document.body));
observer.observe(document.body, { childList: true, subtree: true });

// 🔹 تحويل الأرقام فور تحميل الصفحة أيضًا
document.addEventListener("DOMContentLoaded", () => {
  convertArabicDigitsToEnglish(document.body);
});
