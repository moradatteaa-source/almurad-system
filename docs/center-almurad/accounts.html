<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الحسابات</title>

<style>
:root{
  --blue:#043B64;
  --orange:#FF6B2D;
  --bg:#f4f6fa;
}
body{
  margin:0;
  font-family:Tahoma;
  background:var(--bg);
}
header{
  background:var(--blue);
  color:white;
  padding:12px;
  text-align:center;
  font-size:18px;
}
.container{padding:10px;}
.box{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}
h3{
  margin:5px 0;
  color:var(--blue);
  font-size:15px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}
th{background:#eaf0f6;}
.total{
  font-weight:bold;
  color:var(--orange);
}
button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:var(--orange);
  color:white;
  cursor:pointer;
}
button.gray{
  background:#ccc;
  color:#333;
}
/* منع التقريب التلقائي عند التركيز */
input,
select,
textarea {
  font-size: 16px !important;
  -webkit-text-size-adjust: 100%;
}

/* تحسين سلوك اللمس */
html, body {
  touch-action: manipulation;
}

</style>
</head>

<body>

<header>📊 الحسابات</header>

<div class="container">
<h3>👤 اختيار الكاشير</h3>

<select id="cashierSelect">
  <option value="all">كل الكاشيرات</option>
</select>

  <div class="box">
    <h3>📅 تصفية حسب التاريخ</h3>

    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      من:
      <input type="date" id="fromDate">
      إلى:
      <input type="date" id="toDate">
      <button onclick="filterByRange()">تطبيق</button>
    </div>

    <hr>

    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="quickFilter('today')">اليوم</button>
      <button onclick="quickFilter('week')">هذا الأسبوع</button>
      <button onclick="quickFilter('month')">هذا الشهر</button>
      <button onclick="quickFilter('year')">هذه السنة</button>
      <button class="gray" onclick="quickFilter('all')">الكل</button>
    </div>
  </div>

  <div class="box">
    <h3>🧾 كل الفواتير</h3>
    <table id="table">
      <tr>
   <th>الكاشير</th>
<th>رقم الفاتورة</th>
<th>التاريخ</th>
<th>مجموع الفاتورة</th>
<th>المدفوع</th>
<th>الدين</th>

      </tr>
    </table>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";


/* ✅ Firebase INIT – أول شي */
const firebaseConfig = {
  apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
  authDomain: "almurad-system.firebaseapp.com",
  databaseURL: "https://almurad-system-default-rtdb.firebaseio.com",
  projectId: "almurad-system",
  storageBucket: "almurad-system.firebasestorage.app",
  messagingSenderId: "911755824405",
  appId: "1:911755824405:web:c5520c00c11e336148ad1c"
};

const app = initializeApp(firebaseConfig);
const rtdb = getDatabase(app);




// ===== البيانات =====
const table = document.getElementById("table");
let invoices = []; // ← تعريف الفواتير (راح تجي من Firebase)
let cashiersMap = {};
let currentCashier = "all";
let currentFrom = null;
let currentTo = null;
const fromDate = document.getElementById("fromDate");
const toDate   = document.getElementById("toDate");


// ===== تنسيق إنكليزي =====
const fmt = n => Number(n || 0).toLocaleString("en-US");
const today = () => new Date().toLocaleDateString("en-CA"); // YYYY-MM-DD
// ===== تفاصيل الفاتورة =====
function toggleDetails(row, inv){

  // إذا التفاصيل مفتوحة → سكّرها
  if (row.nextSibling && row.nextSibling.classList?.contains("details")) {
    row.nextSibling.remove();
    return;
  }

  // سكّر أي تفاصيل ثانية مفتوحة
  document.querySelectorAll(".details").forEach(d => d.remove());

  const detailsRow = table.insertRow(row.rowIndex + 1);
  detailsRow.className = "details";

  let html = `
    <table style="width:100%;font-size:12px;margin-top:6px">
      <tr style="background:#f7f7f7">
        <th>المنتج</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>المجموع</th>
      </tr>
  `;

  (inv.items || []).forEach(it=>{
    html += `
      <tr>
        <td>${it.product}</td>
        <td>${it.qty}</td>
        <td>${fmt(it.price)} د.ع</td>
        <td>${fmt(it.total)} د.ع</td>
      </tr>
    `;
  });

  html += `
      <tr style="font-weight:bold;background:#eef3f7">
        <td colspan="3">مجموع الفاتورة</td>
  <td style="color:${inv.grand < 0 ? 'red' : 'black'}">
  ${fmt(inv.grand)} د.ع
</td>
      </tr>
    </table>
  `;

  detailsRow.innerHTML = `<td colspan="6">${html}</td>`;
}
function applyFilters(){

  let filtered = invoices;

  if(currentCashier !== "all"){
    filtered = filtered.filter(inv => 
      inv.cashierId === currentCashier
    );
  }

  if(currentFrom && currentTo){
    filtered = filtered.filter(inv =>
      inv.date >= currentFrom &&
      inv.date <= currentTo
    );
  }

  render(filtered);
}

// ===== عرض الجدول =====
function render(data){
  table.querySelectorAll("tr:not(:first-child)").forEach(r=>r.remove());

  if(!data.length){
    table.insertRow().innerHTML =
      `<td colspan="6">لا توجد فواتير</td>
`;
    return;
  }
  

  let total=0, paid=0, debt=0;

  data.forEach(inv=>{
    total += +inv.grand;
    paid  += +inv.paid;
    debt  += +inv.rest;

const row = table.insertRow();
row.style.cursor = "pointer";

// 🔴 إذا الفاتورة سالب نخلي الصف كله أحمر
if (inv.grand < 0) {
  row.style.color = "red";
}

row.innerHTML = `
<td>${inv.cashierId || "غير معروف"}</td>
<td>${fmt(inv.invoiceNo)}</td>
<td>${inv.date}</td>
<td>${fmt(inv.grand)} د.ع</td>
<td>${fmt(inv.paid)} د.ع</td>
<td>${fmt(inv.rest)} د.ع</td>
`;

// عند الضغط → فتح التفاصيل
row.onclick = () => toggleDetails(row, inv);


  });

table.insertRow().innerHTML = `
  <td></td>
  <td></td>
  <td><strong>المجموع</strong></td>

  <td class="total" style="color:${total < 0 ? 'red' : '#FF6B2D'}">
    ${fmt(total)} د.ع
  </td>

  <td class="total" style="color:${paid < 0 ? 'red' : '#FF6B2D'}">
    ${fmt(paid)} د.ع
  </td>

  <td class="total" style="color:${debt < 0 ? 'red' : '#FF6B2D'}">
    ${fmt(debt)} د.ع
  </td>
`;

}

// ===== فلترة من → إلى =====
function filterByRange(){
  if(!fromDate.value || !toDate.value){
    alert("اختَر تاريخ من وإلى");
    return;
  }

  currentFrom = fromDate.value;
  currentTo   = toDate.value;

  applyFilters();
}

// ===== فلاتر سريعة =====
function quickFilter(type){

  const n = new Date();
  let s,e;

  if(type==="today"){
    s = e = today();
  }

  if(type==="week"){
    const d = new Date();
    d.setDate(d.getDate()-d.getDay());
    s = d.toLocaleDateString("en-CA");
    e = today();
  }

  if(type==="month"){
    s = new Date(n.getFullYear(), n.getMonth(), 1)
          .toLocaleDateString("en-CA");
    e = today();
  }

  if(type==="year"){
    s = new Date(n.getFullYear(), 0, 1)
          .toLocaleDateString("en-CA");
    e = today();
  }

  if(type==="all"){
    currentFrom = null;
    currentTo = null;
    applyFilters();
    return;
  }

  currentFrom = s;
  currentTo   = e;

  applyFilters();
}


function loadInvoices() {
  onValue(ref(rtdb, "posInvoices"), (snap) => {
    invoices = [];

    if (!snap.exists()) {
      render([]);
      return;
    }

    const data = snap.val();

    Object.values(data).forEach(inv => {
      let ts = inv.createdAt;
      let dateStr;

      if (typeof ts === "number") {
        dateStr = new Date(ts).toLocaleDateString("en-CA");
      } else {
        dateStr = today();
      }

invoices.push({
  invoiceNo: inv.invoiceNo || 0,
  date: dateStr,

  // 🔴 إذا راجع نخليها سالب
  grand: inv.type === "return"
    ? -Math.abs(Number(inv.total || 0))
    : Number(inv.total || 0),
   paid: inv.type === "return"
  ? -Math.abs(Number(inv.paid || 0))
  : Number(inv.paid || 0),
        rest: Number(inv.total || 0) - Number(inv.paid || 0),
        cashierId: inv.cashierId || "غير معروف",
        items: inv.items || []
      });
    });

    invoices.sort((a, b) => b.invoiceNo - a.invoiceNo);
    // 🧑‍💼 تعبئة قائمة الكاشيرات (Real-Time)
cashierSelect.innerHTML = `<option value="all">كل الكاشيرات</option>`;

[...new Set(invoices.map(i => i.cashierId))].forEach(id => {
  cashierSelect.innerHTML += `<option value="${id}">${id}</option>`;
});

  applyFilters();

  });
}

// ربط الدوال بالـ HTML
window.quickFilter = quickFilter;
window.filterByRange = filterByRange;
const cashierSelect = document.getElementById("cashierSelect");

cashierSelect.addEventListener("change", () => {
  currentCashier = cashierSelect.value;
  applyFilters();
});


loadInvoices();
</script>


</body>
</html>
