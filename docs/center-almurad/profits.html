<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الأرباح</title>

<style>
:root{
  --blue:#043B64;
  --orange:#FF6B2D;
  --bg:#f4f6fa;
}
body{
  margin:0;
  font-family:Tahoma;
  background:var(--bg);
}
header{
  background:var(--blue);
  color:white;
  padding:12px;
  text-align:center;
  font-size:18px;
}
.container{padding:10px;}
.box{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}
label{font-size:13px}
input,button{
  padding:6px;
  margin:4px 0;
}
button{
  background:var(--orange);
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  margin-top:10px;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}
th{background:#eaf0f6;}
.total{
  font-size:16px;
  font-weight:bold;
  color:var(--orange);
  text-align:center;
  margin-top:10px;
}
/* منع التقريب التلقائي عند الضغط على الحقول */
input,
select,
textarea,
button {
  font-size: 16px !important;
  -webkit-text-size-adjust: 100%;
}

/* منع zoom غير مقصود باللمس */
html, body {
  touch-action: manipulation;
}

</style>
</head>

<body>

<header>💰 الأرباح</header>

<div class="container">

<div class="box">
  <label>👤 الكاشير:</label>
<select id="cashierFilter">
  <option value="all">كل الكاشيرات</option>
</select>
<br>

  <label>من تاريخ:</label>
  <input type="date" id="from">
  <label>إلى تاريخ:</label>
  <input type="date" id="to">
  <br>
  <button onclick="calcProfit()">📊 عرض الأرباح</button>
  <hr>

<button onclick="quickFilter('today')">اليوم</button>
<button onclick="quickFilter('yesterday')">أمس</button>
<button onclick="quickFilter('week')">هذا الأسبوع</button>
<button onclick="quickFilter('month')">هذا الشهر</button>
<button onclick="quickFilter('year')">هذه السنة</button>
<button onclick="quickFilter('all')" style="background:#ccc;color:#333">الكل</button>

</div>

<div class="box">
<table id="table">
  <tr>
    <th>التاريخ</th>
    <th>المنتج</th>
    <th>الكمية</th>
    <th>إجمالي البيع</th>
    <th>إجمالي الشراء</th>
    <th>الربح</th>
  </tr>
</table>

<div id="netProfit" class="total">صافي الربح: 0 د.ع</div>
</div>

</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
  authDomain: "almurad-system.firebaseapp.com",
  databaseURL: "https://almurad-system-default-rtdb.firebaseio.com",
  projectId: "almurad-system",
};




const app = initializeApp(firebaseConfig);
const rtdb = getDatabase(app);



// ================= 💰 حساب الأرباح =================

const table = document.getElementById("table");
const netProfitEl = document.getElementById("netProfit");
let invoices = [];
let warehouse = {};
const cashierFilter = document.getElementById("cashierFilter");
loadData().then(() => calcProfit());

async function loadData(){

  // ✅ تحميل فواتير الكاشير من Realtime DB
  const snap = await get(ref(rtdb, "posInvoices"));
  invoices = [];

  if (snap.exists()) {
    Object.values(snap.val()).forEach(inv => {
      invoices.push(inv);
    });
  }
// تعبئة قائمة الكاشير
cashierFilter.innerHTML = `<option value="all">كل الكاشيرات</option>`;

[...new Set(invoices.map(i => i.cashierId || "غير معروف"))]
.forEach(id=>{
  cashierFilter.innerHTML += `<option value="${id}">${id}</option>`;
});

// ✅ تحميل المخزن (سعر الشراء) من Realtime DB
const whSnap = await get(ref(rtdb, "warehouse"));
warehouse = whSnap.exists() ? whSnap.val() : {};

}
function getBuyPrice(productName){
  const p = warehouse[productName];
  return p && p.buyPrice ? Number(p.buyPrice) : 0;
}




async function calcProfit(){
  


  const from = document.getElementById("from").value;
  const to   = document.getElementById("to").value;

  table.innerHTML = `
    <tr>
      <th>التاريخ</th>
      <th>المنتج</th>
      <th>الكمية</th>
      <th>إجمالي البيع</th>
      <th>إجمالي الشراء</th>
      <th>الربح</th>
    </tr>
  `;

  let netProfit = 0;
  let found = false;

  invoices.forEach(inv=>{
    // فلترة حسب الكاشير
if(cashierFilter.value !== "all"){
  if(inv.cashierId !== cashierFilter.value) return;
}

if (!inv.createdAt) return;

let invDate;

// 🟢 إذا createdAt رقم
if (typeof inv.createdAt === "number") {
  invDate = new Date(inv.createdAt).toLocaleDateString("en-CA");
}

// 🟢 إذا createdAt جاي من serverTimestamp
else if (inv.createdAt.seconds) {
  invDate = new Date(inv.createdAt.seconds * 1000)
    .toLocaleDateString("en-CA");
}

// 🛑 إذا نوع غير معروف
else {
  return;
}

if (from && invDate < from) return;
if (to && invDate > to) return;

    if(!inv.items) return;

    inv.items.forEach(it=>{
 const buyPrice = getBuyPrice(it.product);

      const sellTotal = Number(it.total);
const qty = Number(it.qty);



const buyTotal  = buyPrice * qty;
const profit    = sellTotal - buyTotal;


      netProfit += profit;
      found = true;
const r = table.insertRow();

// 🔴 إذا الربح سالب خلي الصف أحمر
if (profit < 0) {
  r.style.color = "red";
}

r.innerHTML = `
  <td>${invDate}</td>
  <td>${it.product}</td>
  <td>${it.qty}</td>
  <td>${sellTotal.toLocaleString("en-US")} د.ع</td>
  <td>${buyTotal.toLocaleString("en-US")} د.ع</td>
  <td>${profit.toLocaleString("en-US")} د.ع</td>
`;
    });
  });

  if(!found){
    const r = table.insertRow();
    r.innerHTML = `<td colspan="6">لا توجد بيانات ضمن هذه الفترة</td>`;
    netProfitEl.textContent = "صافي الربح: 0 د.ع";
    return;
  }

  netProfitEl.textContent =
    "صافي الربح: " + netProfit.toLocaleString("en-US") + " د.ع";
}
function quickFilter(type){

  const fromInput = document.getElementById("from");
  const toInput   = document.getElementById("to");
fromInput.addEventListener("change", calcProfit);
toInput.addEventListener("change", calcProfit);

  const todayDate = new Date();
  let start, end;

  if(type === "today"){
    start = end = todayDate;
  }

  if(type === "yesterday"){
    const y = new Date();
    y.setDate(y.getDate() - 1);
    start = end = y;
  }

  if(type === "week"){
    const d = new Date();
    d.setDate(d.getDate() - d.getDay());
    start = d;
    end   = todayDate;
  }

  if(type === "month"){
    start = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
    end   = todayDate;
  }

  if(type === "year"){
    start = new Date(todayDate.getFullYear(), 0, 1);
    end   = todayDate;
  }

  if(type === "all"){
    fromInput.value = "";
    toInput.value   = "";
    calcProfit();
    return;
  }

  const fmt = d => d.toLocaleDateString("en-CA");

  fromInput.value = fmt(start);
  toInput.value   = fmt(end);

  calcProfit();
}

window.quickFilter = quickFilter;

window.calcProfit = calcProfit;

</script>

</body>
</html>
