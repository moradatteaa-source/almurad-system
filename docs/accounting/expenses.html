<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💸 المصاريف</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--blue:#043B64;
--orange:#FF6B2D;
--bg:#f4f6fa;
}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg);
margin:0;
}

header{
background:var(--blue);
color:white;
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:8px;
border:1px solid #ddd;
border-radius:6px;
font-family:'Tajawal';
}

button{
background:var(--orange);
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:var(--blue);
color:white;
}

.total{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:var(--orange);
text-align:center;
}

</style>

</head>

<body>

<header>💸 إدارة المصاريف</header>

<div class="container">

<div class="form">

<input type="text" id="type" placeholder="نوع المصروف">

<input type="number" id="amount" placeholder="المبلغ">

<input type="text" id="note" placeholder="ملاحظة">

<button onclick="addExpense()">إضافة</button>

</div>

<table>

<thead>
<tr>
<th>النوع</th>
<th>المبلغ</th>
<th>ملاحظة</th>
<th>التاريخ</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="total">
إجمالي المصاريف: <span id="total">0</span>
</div>

</div>
<div class="container">

<h3>استيراد مصاريف من واتساب</h3>

<textarea id="whatsappInput" style="width:100%;height:150px;padding:10px" placeholder="الصق رسائل الواتساب هنا"></textarea>

<button onclick="importExpenses()">استيراد المصاريف</button>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
authDomain:"almurad-system.firebaseapp.com",
databaseURL:"https://almurad-system-default-rtdb.firebaseio.com/",
projectId:"almurad-system",
storageBucket:"almurad-system.appspot.com",
messagingSenderId:"911755824405",
appId:"1:911755824405:web:2bfbd18ddcf038ca48ad1c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function format(n){
return Number(n||0).toLocaleString("en-US");
}

window.addExpense = async function(){

const type = document.getElementById("type").value;
const amount = Number(document.getElementById("amount").value);
const note = document.getElementById("note").value;

if(!amount) return alert("ادخل المبلغ");

await push(ref(db,"expenses"),{
type,
amount,
note,
date:new Date().toISOString()
});

document.getElementById("amount").value="";
document.getElementById("note").value="";

loadExpenses();

}

async function loadExpenses(){

const snap = await get(ref(db,"expenses"));

if(!snap.exists()) return;

let rows="";
let total=0;

Object.values(snap.val()).reverse().forEach(e=>{

total+=e.amount;

rows+=`
<tr>
<td>${e.type}</td>
<td>${format(e.amount)}</td>
<td>${e.note||""}</td>
<td>${new Date(e.date).toLocaleDateString("en-GB")}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML=rows;
document.getElementById("total").textContent=format(total);

}

loadExpenses();
window.importExpenses = async function(){

const text = document.getElementById("whatsappInput").value;

if(!text.trim()) return alert("الصق الرسائل أولاً");

const parts = text.split("مصروف");

for(const p of parts){

if(!p.trim()) continue;

const typeMatch = p.match(/النوع:\s*(.*)/);
const amountMatch = p.match(/المبلغ:\s*(\d+)/);
const noteMatch = p.match(/ملاحظة:\s*(.*)/);

if(!amountMatch) continue;

const type = typeMatch ? typeMatch[1].trim() : "غير محدد";
const amount = Number(amountMatch[1]);
const note = noteMatch ? noteMatch[1].trim() : "";

await push(ref(db,"expenses"),{
type,
amount,
note,
date:new Date().toISOString()
});

}

document.getElementById("whatsappInput").value="";

loadExpenses();

alert("تم استيراد المصاريف");

}
</script>

</body>
</html>
