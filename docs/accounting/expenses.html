<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💸 المصاريف</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--blue:#043B64;
--orange:#FF6B2D;
--bg:#f4f6fa;
}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg);
margin:0;
}

header{
background:var(--blue);
color:white;
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:8px;
border:1px solid #ddd;
border-radius:6px;
font-family:'Tajawal';
}

button{
background:var(--orange);
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:var(--blue);
color:white;
}

.total{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:var(--orange);
text-align:center;
}

</style>

</head>

<body>

<header>💸 إدارة المصاريف</header>

<div class="container">

<div class="form">

<input type="text" id="type" placeholder="نوع المصروف">

<input type="number" id="amount" placeholder="المبلغ">

<input type="text" id="note" placeholder="ملاحظة">

<button onclick="addExpense()">إضافة</button>

</div>
<button onclick="deleteSelected()" 
style="margin-bottom:10px;background:red;color:white;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;">
🗑 حذف المحدد
</button>
<table>

<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>النوع</th>
<th>المبلغ</th>
<th>ملاحظة</th>
<th>التاريخ</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="total">
إجمالي المصاريف: <span id="total">0</span>
</div>

</div>
<div class="container">

<h3>استيراد مصاريف من واتساب</h3>

<textarea id="whatsappInput" style="width:100%;height:150px;padding:10px" placeholder="الصق رسائل الواتساب هنا"></textarea>

<button onclick="importExpenses()">استيراد المصاريف</button>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, push, get, set, remove, onValue }
from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
authDomain:"almurad-system.firebaseapp.com",
databaseURL:"https://almurad-system-default-rtdb.firebaseio.com/",
projectId:"almurad-system",
storageBucket:"almurad-system.appspot.com",
messagingSenderId:"911755824405",
appId:"1:911755824405:web:2bfbd18ddcf038ca48ad1c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function format(n){
return Number(n||0).toLocaleString("en-US");
}

window.addExpense = async function(){

const type = document.getElementById("type").value;
const amount = Number(document.getElementById("amount").value);
const note = document.getElementById("note").value;

if(!amount) return alert("ادخل المبلغ");

await push(ref(db,"expenses"),{
type,
amount,
note,
date:new Date().toISOString()
});

// تحديث stats (هنا فقط)
const statsSnap = await get(ref(db,"stats"));
const stats = statsSnap.val() || {};

await set(ref(db,"stats"),{
...stats,
totalExpenses: (stats.totalExpenses || 0) + amount
});

document.getElementById("amount").value="";
document.getElementById("note").value="";

loadExpenses();

}

function loadExpenses(){

onValue(ref(db,"expenses"), (snap)=>{

if(!snap.exists()){
document.getElementById("tableBody").innerHTML="";
document.getElementById("total").textContent="0";
return;
}

let rows="";
let total=0;

Object.entries(snap.val()).reverse().forEach(([id,e])=>{

total+=e.amount;

rows+=`
<tr>
<td><input type="checkbox" class="rowCheck" value="${id}" data-amount="${e.amount}"></td>
<td>${e.type}</td>
<td>${e.amount.toLocaleString()}</td>
<td>${e.note||""}</td>
<td>${new Date(e.date).toLocaleDateString("en-GB")}</td>
<td><button onclick="deleteExpense('${id}', ${e.amount})">🗑 حذف</button></td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML=rows;
document.getElementById("total").textContent=total.toLocaleString();

});
}

loadExpenses();
window.importExpenses = async function(){

const text = document.getElementById("whatsappInput").value;

if(!text.trim()) return alert("الصق الرسائل أولاً");

// تنظيف النص من الرموز المخفية
const cleanText = text.replace(/\u200e|\u200f/g, "");

// تقسيم الرسائل
const messages = cleanText.split(/\n(?=\[)/);

let count = 0;

for(const msg of messages){

if(!msg.trim()) continue;

// استخراج التاريخ
const dateMatch = msg.match(/\[(.*?)\]/);
let date = new Date();

if(dateMatch){

const raw = dateMatch[1];

// مثال: 10/3/2026، 12:44:40 م
const datePart = raw.split("،")[0].trim();

const [day,month,year] = datePart.split("/");

date = new Date(`${year}-${month}-${day}`);
}

// استخراج البيانات
const typeMatch = msg.match(/النوع:\s*(.*)/);
const amountMatch = msg.match(/المبلغ:\s*([\d]+)/);
const noteMatch = msg.match(/ملاحظة:\s*(.*)/);

if(!amountMatch) continue;

const type = typeMatch ? typeMatch[1].trim() : "غير محدد";
const amount = Number(amountMatch[1]);
const note = noteMatch ? noteMatch[1].trim() : "";

// حفظ
await push(ref(db,"expenses"),{
type,
amount,
note,
date: date.toISOString()
});

// تحديث stats
const statsSnap = await get(ref(db,"stats"));
const stats = statsSnap.val() || {};

await set(ref(db,"stats"),{
...stats,
totalExpenses: (stats.totalExpenses || 0) + amount
});

count++;

}

document.getElementById("whatsappInput").value="";
loadExpenses();

alert("تم استيراد " + count + " مصروف 🔥");

}
window.toggleAll = function(source){
document.querySelectorAll(".rowCheck").forEach(cb=>{
cb.checked = source.checked;
});
}
window.deleteSelected = async function(){

const selected = document.querySelectorAll(".rowCheck:checked");

if(selected.length === 0){
alert("حدد مصاريف أولاً");
return;
}

if(!confirm("تريد حذف المحدد؟")) return;

let totalDeleted = 0;

for(const cb of selected){

const id = cb.value;
const amount = Number(cb.dataset.amount);

await remove(ref(db,"expenses/"+id));

totalDeleted += amount;

}

// تحديث stats مرة وحدة
const statsSnap = await get(ref(db,"stats"));
const stats = statsSnap.val() || {};

await set(ref(db,"stats"),{
...stats,
totalExpenses: Math.max((stats.totalExpenses || 0) - totalDeleted, 0)
});

loadExpenses();

alert("تم حذف " + selected.length + " مصروف 🔥");

}

window.deleteExpense = async function(id, amount){

if(!confirm("تريد تحذف المصروف؟")) return;

// حذف المصروف
await remove(ref(db,"expenses/"+id));

// تحديث stats
const statsSnap = await get(ref(db,"stats"));
const stats = statsSnap.val() || {};

await set(ref(db,"stats"),{
...stats,
totalExpenses: Math.max((stats.totalExpenses || 0) - amount, 0)
});

loadExpenses();

}
</script>

</body>
</html>
