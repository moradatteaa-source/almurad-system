<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📊 أرباح الطلبات</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--blue:#043B64;
--orange:#FF6B2D;
--bg:#f4f6fa;
}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg);
margin:0;
padding:0;
}

header{
background:var(--blue);
color:white;
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:var(--blue);
color:white;
position:sticky;
top:0;
}

.summary{
display:flex;
gap:20px;
margin-bottom:15px;
}

.box{
background:var(--bg);
padding:10px;
border-radius:8px;
flex:1;
text-align:center;
}

.box h3{
margin:0;
font-size:14px;
}

.box p{
font-size:18px;
font-weight:bold;
color:var(--orange);
margin:5px 0 0;
}

</style>

</head>

<body>

<header>📊 أرباح الطلبات</header>

<div class="container">

<div class="summary">

<div class="box">
<h3>عدد الطلبات</h3>
<p id="ordersCount">0</p>
</div>

<div class="box">
<h3>إجمالي المبيعات</h3>
<p id="totalSales">0</p>
</div>

<div class="box">
<h3>تكلفة الشراء</h3>
<p id="totalBuy">0</p>
</div>

<div class="box">
<h3>الربح</h3>
<p id="totalProfit">0</p>
</div>

</div>

<div style="overflow:auto;max-height:500px">

<table>

<thead>

<tr>
<th>#</th>
<th>الطلب</th>
<th>المنتج</th>
<th>الكمية</th>
<th>البيع</th>
<th>الشراء</th>
<th>التوصيل</th>
<th>الربح</th>
<th>التاريخ</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
authDomain:"almurad-system.firebaseapp.com",
databaseURL:"https://almurad-system-default-rtdb.firebaseio.com/",
projectId:"almurad-system",
storageBucket:"almurad-system.appspot.com",
messagingSenderId:"911755824405",
appId:"1:911755824405:web:2bfbd18ddcf038ca48ad1c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function format(n){
return Number(n||0).toLocaleString("en-US");
}

async function loadData(){

const ordersSnap = await get(ref(db,"orders"));
const warehouseSnap = await get(ref(db,"warehouse"));
const settingsSnap = await get(ref(db,"settings/deliveryCost"));

if(!ordersSnap.exists()) return;

const orders = Object.entries(ordersSnap.val());

const warehouse = warehouseSnap.exists()?warehouseSnap.val():{};

const deliveryCost = settingsSnap.exists()?Number(settingsSnap.val()):0;

let rows = "";

let totalSales = 0;
let totalBuy = 0;
let totalProfit = 0;
let count = 0;

orders.forEach(([id,order],i)=>{

if(order.status !== "تم التسليم") return;

count++;

let orderProfit = -deliveryCost;

(order.productsDetailed || []).forEach(p=>{

const name = p.name;

const qty = p.qty || 1;

const sellTotal = p.price || 0;

const buyPrice = warehouse[name]?.buyPrice || 0;

const buyTotal = buyPrice * qty;

const profit = sellTotal - buyTotal;

orderProfit += profit;

totalSales += sellTotal;
totalBuy += buyTotal;

rows += `
<tr>
<td>${count}</td>
<td>${id}</td>
<td>${name}</td>
<td>${qty}</td>
<td>${format(sellTotal)}</td>
<td>${format(buyTotal)}</td>
<td>${format(deliveryCost)}</td>
<td>${format(profit)}</td>
<td>${new Date(order.orderDate).toLocaleDateString("en-GB")}</td>
</tr>
`;

});

totalProfit += orderProfit;

});

document.getElementById("tableBody").innerHTML = rows;

document.getElementById("ordersCount").textContent = count;
document.getElementById("totalSales").textContent = format(totalSales);
document.getElementById("totalBuy").textContent = format(totalBuy);
document.getElementById("totalProfit").textContent = format(totalProfit);

}

loadData();

</script>

</body>
</html>
