<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#043B64">
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <title>تفاصيل الطلب - نظام المراد</title>
  
  <style>
    :root {
      --main-blue: #043B64;
      --main-blue-dark: #032a47;
      --accent-orange: #FF6B2D;
      --accent-orange-dark: #e55a2b;
      --background-gray: #f2f3f5;
      --card-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #666;
      --border-color: #e0e0e0;
      --border-radius: 14px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --success: #27ae60;
      --warning: #f39c12;
      --error: #e74c3c;
      --info: #3498db;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--background-gray); color: var(--text-primary);
      line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }

    header {
      background: linear-gradient(135deg, var(--main-blue) 0%, var(--main-blue-dark) 100%);
      color: white; text-align: center; padding: 16px 20px; font-size: 18px;
      font-weight: 700; box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    header::before { content: "📦"; font-size: 20px; }

    .container { max-width: 720px; margin: 0 auto; padding: 12px; padding-bottom: 100px; }

    .card {
      background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm);
      padding: 18px 20px; margin-bottom: 14px; transition: var(--transition); border: 1px solid var(--border-color);
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color); color: var(--main-blue); font-weight: 700; font-size: 15px;
    }
    .card-header::before { content: "•"; color: var(--accent-orange); font-size: 24px; line-height: 1; }

    .row { display: flex; gap: 16px; flex-wrap: wrap; margin: 0 -8px; }
    .field { flex: 1; min-width: 140px; padding: 0 8px; display: flex; flex-direction: column; gap: 6px; }
    .field.small { flex: 0 0 130px; }
    .field.single { max-width: 100%; margin: 0 auto; }

    label { color: var(--main-blue); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 4px; }
    label::before { content: "📍"; font-size: 12px; opacity: 0.7; }

    input, textarea, select {
      border: 1px solid var(--border-color); border-radius: 10px; padding: 11px 14px;
      font-size: 15px; width: 100%; background: #fff; transition: var(--transition); color: var(--text-primary);
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent-orange);
      box-shadow: 0 0 0 3px rgba(255, 107, 45, 0.15); background: #fffdfb;
    }
    input[readonly], textarea[readonly] { background: #f8f9fa; color: var(--text-secondary); cursor: not-allowed; }
    textarea { resize: vertical; min-height: 70px; max-height: 200px; line-height: 1.6; }

    button {
      border: none; border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center;
      justify-content: center; gap: 8px; width: 100%; margin-top: 8px;
    }
    button:active { transform: scale(0.98); }

    #saveBtn { background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-dark)); color: white; box-shadow: 0 4px 14px rgba(255, 107, 45, 0.3); }
    #saveBtn:hover { box-shadow: 0 6px 20px rgba(255, 107, 45, 0.4); transform: translateY(-2px); }

    #backBtn { background: linear-gradient(135deg, var(--main-blue), var(--main-blue-dark)); color: white; }
    #backBtn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .add-small-btn {
      background: rgba(4, 59, 100, 0.08); color: var(--main-blue); border: 2px dashed var(--main-blue);
      border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
      margin: 12px auto; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: var(--transition); width: auto; min-width: 180px;
    }
    .add-small-btn:hover { background: var(--main-blue); color: white; transform: scale(1.03); }

    .source-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 8px 0; }
    .source-btn {
      width: 48px; height: 48px; background: #f1f3f5; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      cursor: pointer; transition: var(--transition); border: 2px solid transparent; color: var(--text-secondary);
    }
    .source-btn:hover { background: #e8ecef; transform: translateY(-2px); }
    .source-btn.active {
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-dark));
      color: white; border-color: var(--accent-orange);
      box-shadow: 0 4px 12px rgba(255, 107, 45, 0.3); transform: scale(1.05);
    }

    .history-card {
      background: var(--card-bg); border-radius: var(--border-radius); padding: 16px 20px;
      margin: 16px 0; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
    }
    .history-title {
      font-weight: 700; color: var(--main-blue); margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-orange); display: flex; align-items: center; gap: 8px; font-size: 15px;
    }
    .history-title::before { content: "📋"; }
    .history-item {
      padding: 10px 0; border-bottom: 1px dashed var(--border-color);
      display: flex; flex-direction: column; gap: 4px; animation: slideIn 0.3s ease;
    }
    .history-item:last-child { border-bottom: none; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .status-name { color: var(--accent-orange); font-weight: 700; font-size: 14px; }
    .user-name { color: var(--main-blue); font-weight: 600; }
    .history-time { color: var(--text-secondary); font-size: 12px; }

    .extra-product {
      background: #fff; border-radius: var(--border-radius); padding: 16px 18px;
      margin-top: 14px; border: 2px solid var(--accent-orange); position: relative;
      transition: var(--transition); box-shadow: var(--shadow-sm);
    }
    .extra-product::before {
      content: "➕ منتج إضافي"; position: absolute; top: -11px; right: 16px;
      background: var(--accent-orange); color: white; font-size: 11px;
      padding: 3px 10px; border-radius: 20px; font-weight: 600;
    }
    .extra-product:hover { background: #fff9f6; transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .delete-btn {
      position: absolute; top: 8px; left: 12px; color: var(--error); cursor: pointer;
      font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; transition: var(--transition); background: rgba(231, 76, 60, 0.1);
    }
    .delete-btn:hover { background: var(--error); color: white; transform: scale(1.1); }

    .variant-group { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-color); }
    .variant-group label::before { content: "⚙️"; }

    #productTagsContainer { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding: 8px 0; }
    .product-tag {
      background: linear-gradient(135deg, var(--main-blue), var(--main-blue-dark));
      color: white; padding: 6px 14px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .product-tag .remove { cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
    .product-tag .remove:hover { opacity: 1; }

    #totalsCard {
      background: linear-gradient(135deg, #e8f4f8, #d6eaf8); border-radius: var(--border-radius);
      padding: 16px; margin: 16px 0; border: 2px solid var(--main-blue);
    }
    #totalsCard .field label { color: var(--main-blue-dark); }
    #totalsCard input { background: white; font-weight: 700; color: var(--main-blue); text-align: center; font-size: 16px; }

    .undo-redo-fixed { position: fixed; top: 16px; left: 16px; display: flex; gap: 8px; z-index: 1000; }
    .undo-redo-fixed button {
      width: 40px; height: 40px; padding: 0; border-radius: 50%;
      background: var(--main-blue); color: white; font-size: 18px; font-weight: bold; box-shadow: var(--shadow-md); margin: 0;
    }
    .undo-redo-fixed button:hover { transform: scale(1.1); box-shadow: var(--shadow-lg); }

    .top-contact-buttons { position: fixed; top: 80px; left: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
    .contact-btn {
      width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 24px; text-decoration: none; color: white;
      box-shadow: var(--shadow-md); transition: var(--transition); animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .contact-btn:nth-child(2) { animation-delay: 0.5s; }
    .contact-btn:hover { transform: scale(1.1) !important; box-shadow: var(--shadow-lg); }
    .contact-btn.whatsapp { background: #25D366; }
    .contact-btn:not(.whatsapp) { background: var(--main-blue); }

    #globalLoader {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.95); display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 9999;
    }
    #globalLoader.show { display: flex; }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--border-color); border-top-color: var(--accent-orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--main-blue); font-weight: 600; font-size: 15px; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(30px);
      background: var(--main-blue); color: white; padding: 12px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000;
      box-shadow: var(--shadow-lg); max-width: 90%; text-align: center; display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error { background: var(--error); }
    #toast.warning { background: var(--warning); color: #1a1a2e; }

    .input-error { border: 2px solid var(--error) !important; background: #fff5f5 !important; animation: shake 0.4s ease; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    @media (max-width: 768px) {
      .container { padding: 10px; padding-bottom: 90px; }
      .card { padding: 16px 18px; }
      .field.small { flex: 0 0 120px; }
      .source-btn { width: 44px; height: 44px; font-size: 20px; }
      .contact-btn { width: 48px; height: 48px; font-size: 22px; }
      .undo-redo-fixed { top: 12px; left: 12px; }
      .undo-redo-fixed button { width: 36px; height: 36px; font-size: 16px; }
      header { padding: 14px 16px; font-size: 17px; }
      input, textarea, select, button { font-size: 16px !important; touch-action: manipulation !important; }
    }
    @media (min-width: 769px) { .container { padding: 20px; } .card { padding: 22px 24px; } }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--background-gray); }
    ::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--main-blue-dark); }
  </style>
</head>
<body>

  <header>
    <span>تفاصيل الطلب</span>
    <span id="orderIdDisplay" style="font-size: 13px; opacity: 0.9; font-weight: 400;"></span>
  </header>

  <div class="undo-redo-fixed">
    <button id="undoBtn" title="تراجع (Ctrl+Z)">↩️</button>
    <button id="redoBtn" title="إعادة (Ctrl+Y)">↪️</button>
  </div>

  <div class="top-contact-buttons">
    <a id="callBtn" class="contact-btn" href="#" title="اتصال">📞</a>
    <a id="whatsappBtn" class="contact-btn whatsapp" href="#" title="واتساب" target="_blank" rel="noopener">💬</a>
  </div>

  <div id="globalLoader">
    <div class="spinner"></div>
    <div class="loader-text">جاري التحميل...</div>
  </div>

  <div id="toast"></div>

  <div class="container">
    
    <div class="card" id="receiptCard" style="display:none;">
      <div class="card-header">🧾 رقم الوصل</div>
      <div class="field single">
        <label>رقم الوصل (الوسيط)</label>
        <input id="receiptNum" type="text" placeholder="اكتب رقم الوصل" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <div class="card-header">📋 المعلومات الأساسية</div>
      <div class="field single" style="margin-bottom: 14px;">
        <label>الكود</label>
        <input id="code" type="text" placeholder="أدخل الكود" autocomplete="off">
      </div>
      <div class="row">
        <div class="field small">
          <label>📱 الهاتف الأول</label>
          <input id="phone1" type="tel" placeholder="07xxxxxxxxx" inputmode="tel">
        </div>
        <div class="field small">
          <label>📱 الرقم الثاني</label>
          <input id="phone2" type="tel" placeholder="اختياري" inputmode="tel">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🔗 مصدر الطلب</div>
      <div class="field single">
        <div id="sourceButtons" class="source-buttons"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📍 العنوان</div>
      <div class="row">
        <div class="field small">
          <label>المحافظة</label>
          <div id="city"></div>
        </div>
        <div class="field small">
          <label>المنطقة</label>
          <div id="area"></div>
        </div>
      </div>
      <div class="field single" style="margin-top: 12px;">
        <label>العنوان الكامل</label>
        <textarea id="address" placeholder="اكتب العنوان بالتفصيل..." rows="3"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🛍️ المنتج والتسعير</div>
      <div class="field single">
        <label>اسم المنتج</label>
        <div id="product"></div>
        <div id="productTagsContainer"></div>
      </div>
      <div class="row" style="margin-top: 14px;">
        <div class="field small">
          <label>💰 السعر</label>
          <input id="price" type="text" inputmode="decimal" placeholder="0">
        </div>
        <div class="field small">
          <label>🔢 الكمية</label>
          <input id="quantity" type="text" inputmode="numeric" placeholder="1">
        </div>
      </div>
      <div id="variantsContainer"></div>
    </div>

    <div class="card">
      <div class="card-header">🎁 منتجات إضافية</div>
      <div id="extraProducts"></div>
      <button id="addProductBtn" class="add-small-btn">
        <span style="font-size: 18px;">➕</span> إضافة منتج آخر
      </button>
      <div id="totalsCard" style="display:none;">
        <div class="row">
          <div class="field small">
            <label>📦 إجمالي العدد</label>
            <input id="totalQty" readonly>
          </div>
          <div class="field small">
            <label>💵 إجمالي السعر</label>
            <input id="totalPrice" readonly>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📝 معلومات إضافية</div>
      <div class="field single">
        <label>الملاحظات</label>
        <textarea id="notes" placeholder="أي ملاحظات إضافية..." rows="3"></textarea>
      </div>
      <div class="field single" style="margin-top: 12px;">
        <label>📅 تاريخ الطلب</label>
        <input id="orderDate" readonly>
      </div>
      <div class="field single" style="margin-top: 12px;">
        <label>📢 المعلن</label>
        <input id="advertiser" type="text" placeholder="اسم المعلن">
      </div>
    </div>

    <div class="card">
      <div class="card-header">🔄 حالة الطلب</div>
      <div class="row">
        <div class="field small">
          <label>الحالة الحالية</label>
          <div id="status"></div>
        </div>
      </div>
    </div>

    <div id="historyCard" class="history-card"></div>

    <button id="saveBtn"><span>💾</span> حفظ التعديلات</button>
    <button id="backBtn"><span>🔙</span> رجوع للقائمة</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, get, update, onValue, set } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
    import { citiesData, allCities } from "./citiesData.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
      authDomain: "almurad-system.firebaseapp.com",
      databaseURL: "https://almurad-system-default-rtdb.firebaseio.com/",
      projectId: "almurad-system",
      storageBucket: "almurad-system.appspot.com",
      messagingSenderId: "911755824405",
      appId: "1:911755824405:web:2bfbd18ddcf038ca48ad1c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ===== الحالات المدعومة =====
    const TEST_STATUSES = [
      'تم التسليم', 'قيد المعالجة', 'جديد', 'مثبت',
      'قيد التجهيز', 'بانتظار البضاعة', 'قيد التوصيل',
      'راجع', 'تم استلام الراجع', 'رفض'
    ];

    const state = {
      orderId: null,
      orderData: null,
      currentPath: null,
      isAdmin: false,
      allProducts: [],
      extraProducts: [],
      isLoading: false,
      historyStack: [],
      redoStack: []
    };

    // ===== دوال مساعدة =====
    function showToast(msg, type = 'info', duration = 2500) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `show ${type}`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function showLoader(show, text = 'جاري التحميل...') {
      const loader = document.getElementById('globalLoader');
      loader.querySelector('.loader-text').textContent = text;
      loader.classList.toggle('show', show);
      state.isLoading = show;
    }

    function formatIraqiDate(t) {
      if (!t) return '';
      const d = new Date(t);
      let h = d.getHours(), m = d.getMinutes().toString().padStart(2, '0');
      const ampm = h >= 12 ? 'مساءً' : 'صباحاً';
      h = h % 12 || 12;
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()} - ${h}:${m} ${ampm}`;
    }

    function normalizeNumber(str) {
      if (!str) return '';
      const arabic = '٠١٢٣٤٥٦٧٨٩', english = '0123456789';
      return String(str).split('').map(ch => { const i = arabic.indexOf(ch); return i >= 0 ? english[i] : ch; }).join('').replace(/[^\d]/g, '');
    }

    function normalizeIraqiPhone(phone) {
      let n = normalizeNumber(phone);
      if (n.startsWith('00964')) n = '964' + n.slice(5);
      else if (!n.startsWith('964')) {
        if (n.startsWith('0')) n = '964' + n.slice(1);
        else if (n.length === 10) n = '964' + n;
      }
      return n;
    }

    // ===== حساب مسار الطلب بناءً على الحالة =====
    function getPathForStatus(status, orderId) {
      if (TEST_STATUSES.includes(status)) {
        return `ordersTest/${status}/${orderId}`;
      }
      return `orders/${orderId}`;
    }

    // ===== البحث عن الطلب في كل المسارات =====
    async function findOrder(orderId) {
      // ابدأ بالمسارات التي فيها حالات ordersTest
      const pathsToCheck = TEST_STATUSES.map(s => `ordersTest/${s}/${orderId}`);
      pathsToCheck.push(`orders/${orderId}`);

      for (const path of pathsToCheck) {
        try {
          const snap = await get(ref(db, path));
          if (snap.exists()) {
            console.log(`✅ وُجد الطلب في: ${path}`);
            return { data: snap.val(), path };
          }
        } catch (err) {
          console.warn(`تعذّر التحقق من: ${path}`, err.message);
        }
      }
      return null;
    }

    // ===== مراقب التغييرات =====
    let changeUnsubscribe = null;
    function setupAutoRefresh(dataPath) {
      if (changeUnsubscribe) { changeUnsubscribe(); changeUnsubscribe = null; }
      const metaPath = dataPath.split('/').slice(0, -1).join('/') + '/_meta/lastModified';
      changeUnsubscribe = onValue(ref(db, metaPath), (snap) => {
        if (!snap.exists()) return;
        const serverTime = snap.val();
        const cached = localStorage.getItem(`cacheTime_${state.orderId}`);
        if (cached && serverTime > parseInt(cached)) {
          loadOrder();
          showToast('📦 تم تحديث البيانات', 'success');
        }
        localStorage.setItem(`cacheTime_${state.orderId}`, serverTime.toString());
      });
    }

    // ===== إنشاء القائمة المنسدلة =====
    function createDropdown(options, selected, onChange) {
      const wrapper = document.createElement('div');
      wrapper.style.position = 'relative';

      const input = document.createElement('input');
      input.type = 'text';
      input.value = selected || '';
      input.placeholder = 'اختر أو اكتب...';
      input.style.cursor = 'pointer';
      input.readOnly = true;

      const dropdown = document.createElement('div');
      Object.assign(dropdown.style, {
        position: 'absolute', top: '100%', left: 0, right: 0,
        background: '#fff', border: '1px solid var(--border-color)', borderRadius: '10px',
        boxShadow: 'var(--shadow-lg)', maxHeight: '200px', overflowY: 'auto',
        zIndex: '1000', display: 'none', fontSize: '14px', marginTop: '4px'
      });

      function renderList(filter = '') {
        dropdown.innerHTML = '';
        const filtered = options.filter(o => o.toLowerCase().includes(filter.toLowerCase()));
        if (!filtered.length) {
          dropdown.innerHTML = '<div style="padding:10px;color:var(--text-secondary);text-align:center">لا توجد نتائج</div>';
          return;
        }
        filtered.slice(0, 50).forEach(o => {
          const opt = document.createElement('div');
          opt.textContent = o;
          opt.style.cssText = 'padding:10px 14px;cursor:pointer;transition:background 0.15s;';
          opt.onmouseenter = () => opt.style.background = '#f1f3f5';
          opt.onmouseleave = () => opt.style.background = '';
          opt.onclick = () => { input.value = o; dropdown.style.display = 'none'; input.readOnly = true; onChange(o); };
          dropdown.appendChild(opt);
        });
      }

      input.addEventListener('click', () => { input.readOnly = false; input.focus(); dropdown.style.display = 'block'; renderList(); });
      input.addEventListener('input', (e) => renderList(e.target.value));
      document.addEventListener('click', (e) => { if (!wrapper.contains(e.target)) { dropdown.style.display = 'none'; input.readOnly = true; } });

      wrapper.appendChild(input);
      wrapper.appendChild(dropdown);
      return wrapper;
    }

    // ===== متغيرات المنتج =====
    async function loadVariants(productName) {
      const container = document.getElementById('variantsContainer');
      if (!container) return;
      container.innerHTML = '';
      try {
        const snap = await get(ref(db, `warehouse/${productName}`));
        if (!snap.exists()) return;
        const stock = snap.val().stock || {};
        const activeKeys = Object.keys(stock).filter(k => k !== 'إجمالي الكمية' && k !== 'default' && stock[k] > 0);
        if (!activeKeys.length) return;

        const savedSnap = await get(ref(db, `${state.currentPath}/selectedVariants`));
        const savedVariants = savedSnap.exists() ? savedSnap.val() : {};
        const variantsMap = {};
        activeKeys.forEach(key => {
          key.split('|').map(s => s.trim()).forEach((v, i, arr) => {
            if (i % 2 === 0 && arr[i+1]) { if (!variantsMap[v]) variantsMap[v] = new Set(); variantsMap[v].add(arr[i+1]); }
          });
        });

        const variantNames = Object.keys(variantsMap);
        const selected = { ...savedVariants };

        function renderDropdown(level = 0) {
          Array.from(container.querySelectorAll('.variant-group')).slice(level).forEach(el => el.remove());
          const name = variantNames[level]; if (!name) return;
          const filteredKeys = activeKeys.filter(key => Object.entries(selected).every(([k, v]) => key.includes(`${k} | ${v}`)));
          const available = new Set();
          filteredKeys.forEach(key => {
            key.split('|').map(s => s.trim()).forEach((v, i, arr) => { if (v === name && arr[i+1]) available.add(arr[i+1]); });
          });
          if (!available.size) return;
          const wrapper = document.createElement('div'); wrapper.className = 'variant-group field single';
          const label = document.createElement('label'); label.textContent = name;
          wrapper.appendChild(label);
          wrapper.appendChild(createDropdown([...available], selected[name] || '', (val) => {
            selected[name] = val;
            update(ref(db, `${state.currentPath}/selectedVariants`), selected);
            renderDropdown(level + 1);
          }));
          container.appendChild(wrapper);
        }
        renderDropdown(0);
      } catch (err) { console.warn('فشل تحميل المتغيرات:', err); }
    }

    // ===== التحقق قبل الحفظ =====
    async function validateBeforeSave() {
      const statusVal = document.querySelector('#status input')?.value.trim();
      const requiredStatuses = ['مثبت', 'قيد التوصيل', 'تم التسليم', 'تم استلام الراجع'];
      if (!requiredStatuses.includes(statusVal)) return true;

      let valid = true;
      document.querySelectorAll('.input-error').forEach(e => e.classList.remove('input-error'));

      function markError(el, msg) {
        if (el) { el.classList.add('input-error'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        showToast(msg, 'error'); valid = false;
      }

      if (!document.getElementById('code').value.trim()) markError(document.getElementById('code'), '⚠️ يرجى كتابة الكود');
      if (normalizeNumber(document.getElementById('phone1').value).length !== 11) markError(document.getElementById('phone1'), '⚠️ رقم الهاتف يجب أن يكون 11 رقم');
      if (!document.querySelector('#city input')?.value.trim()) markError(document.querySelector('#city input'), '⚠️ يرجى اختيار المحافظة');
      if (!document.querySelector('#area input')?.value.trim()) markError(document.querySelector('#area input'), '⚠️ يرجى اختيار المنطقة');
      if (!document.querySelector('#product input')?.value.trim()) markError(document.querySelector('#product input'), '⚠️ يرجى اختيار المنتج');

      const price = document.getElementById('price').value.replace(/,/g, '').trim();
      if (!price || isNaN(price) || Number(price) < 0) markError(document.getElementById('price'), '⚠️ يرجى كتابة سعر صحيح');

      const qty = normalizeNumber(document.getElementById('quantity').value);
      if (!qty || Number(qty) <= 0) markError(document.getElementById('quantity'), '⚠️ يرجى كتابة كمية صحيحة');

      document.querySelectorAll('#variantsContainer .variant-group input').forEach(input => {
        if (!input.value.trim()) {
          input.classList.add('input-error');
          const label = input.closest('.variant-group')?.querySelector('label')?.textContent;
          showToast(`⚠️ يرجى اختيار: ${label}`, 'error');
          valid = false;
        }
      });

      for (const p of state.extraProducts) {
        const card = document.querySelector(`[data-pid="${p.id}"]`);
        if (!p.name?.trim()) { card?.querySelector('.field.single input')?.classList.add('input-error'); showToast('⚠️ يوجد منتج إضافي بدون اسم', 'error'); valid = false; }
        if (!p.qty || p.qty <= 0) { card?.querySelector('.qty-input')?.classList.add('input-error'); showToast(`⚠️ كمية غير صحيحة: ${p.name}`, 'error'); valid = false; }
        if (p.price < 0) { card?.querySelector('.price-input')?.classList.add('input-error'); showToast(`⚠️ سعر غير صحيح: ${p.name}`, 'error'); valid = false; }
      }
      return valid;
    }

    // ===== الحفظ الرئيسي (مع نقل ذري بدون تكرار) =====
    async function handleSave() {
      if (state.isLoading) return;
      if (!(await validateBeforeSave())) return;
      showLoader(true, 'جاري الحفظ...');

      try {
        const userName = JSON.parse(localStorage.getItem('loggedInUser') || '{}')?.username || 'غير معروف';
        const timeNow = new Date().toISOString();

        // --- جمع بيانات المنتجات ---
        const mainProductName = document.querySelector('#product input')?.value.trim() || '';
        const mainPrice = parseFloat(document.getElementById('price').value) || 0;
        const mainQty = parseFloat(normalizeNumber(document.getElementById('quantity').value)) || 0;

        const mainSnap = await get(ref(db, `${state.currentPath}/selectedVariants`));
        const mainVariants = mainSnap.exists() ? mainSnap.val() : {};

        const productsDetailed = [];
        const notesArray = [];

        if (mainProductName) {
          const variantsObj = {};
          document.querySelectorAll('#variantsContainer .variant-group').forEach(group => {
            const l = group.querySelector('label')?.textContent.trim();
            const v = group.querySelector('input')?.value.trim();
            if (l && v) variantsObj[l] = v;
          });
          const varsText = Object.keys(variantsObj).length
            ? ` (${Object.entries(variantsObj).map(([k, v]) => `${k}: ${v}`).join(', ')})`
            : '';
          notesArray.push(`${mainProductName} ×${mainQty}${varsText}`);
          productsDetailed.push({ name: mainProductName, qty: mainQty, price: mainPrice, variants: variantsObj });
        }

        state.extraProducts.forEach(p => {
          const card = document.querySelector(`[data-pid="${p.id}"]`);
          if (!card) return;
          const varsObj = {};
          card.querySelectorAll('.variant-group').forEach(group => {
            const l = group.querySelector('label')?.textContent.trim();
            const v = group.querySelector('input')?.value.trim();
            if (l && v) varsObj[l] = v;
          });
          const varsText = Object.keys(varsObj).length ? ` (${Object.entries(varsObj).map(([k, v]) => `${k}: ${v}`).join(', ')})` : '';
          notesArray.push(`${p.name} ×${p.qty}${varsText}`);
          productsDetailed.push({ name: p.name, qty: p.qty, price: p.price, variants: varsObj });
        });

        const cleanedDetails = productsDetailed.filter(p => p.name?.trim());
        const totalPrice = cleanedDetails.reduce((s, item) => s + (Number(item.price) || 0), 0);
        const totalQty = cleanedDetails.reduce((s, item) => s + (Number(item.qty) || 0), 0);
        const finalProductName = [...new Set(cleanedDetails.map(i => i.name.trim()))].join('، ');

        const autoNotes = notesArray.join(' | ').trim();
        let userNotes = document.getElementById('notes').value.trim();
        if (userNotes.includes('||')) userNotes = userNotes.split('||').slice(1).join('||').trim();
        userNotes = userNotes.split('||').map(p => p.trim()).filter(Boolean).join(' || ').trim();
        const finalNotes = userNotes ? `${autoNotes} || ${userNotes}` : autoNotes;

        // --- الحالة الجديدة ---
        const newStatus = document.querySelector('#status input')?.value.trim();
        const oldStatus = state.orderData?.status || '';
        const statusChanged = newStatus && newStatus !== oldStatus;

        // --- بناء كائن التاريخ المحدث ---
        const existingHistory = state.orderData?.statusHistory || {};
        const updatedHistory = statusChanged
          ? { ...existingHistory, [encodeURIComponent(newStatus)]: { time: timeNow, by: userName } }
          : existingHistory;

        // --- البيانات الكاملة للطلب ---
        const fullOrderData = {
          ...state.orderData,
          code: document.getElementById('code').value.trim(),
          receiptNum: document.getElementById('receiptNum').value.trim(),
          phone1: document.getElementById('phone1').value.trim(),
          phone2: document.getElementById('phone2').value.trim(),
          address: document.getElementById('address').value.trim(),
          productName: mainProductName,
          totalProducts: finalProductName,
          totalPrice,
          totalQty,
          notes: finalNotes,
          advertiser: document.getElementById('advertiser').value.trim(),
          price: mainPrice,
          quantity: mainQty,
          extraProducts: state.extraProducts,
          selectedVariants: mainVariants,
          productsDetailed: cleanedDetails,
          status: newStatus || oldStatus,
          statusHistory: updatedHistory,
          updatedBy: userName,
          updatedAt: timeNow,
          ...(statusChanged ? { enterIndex: Date.now() } : {})
        };

        const oldPath = state.currentPath;
        const newPath = getPathForStatus(fullOrderData.status, state.orderId);

        if (statusChanged && newPath !== oldPath) {
          // ===== نقل ذري: اكتب الجديد + احذف القديم في عملية واحدة =====
          const atomicUpdate = {};
          atomicUpdate[newPath] = fullOrderData;
          atomicUpdate[oldPath] = null; // حذف من المسار القديم

          await update(ref(db), atomicUpdate);

          // تحديث meta للمسارين
          const oldBase = oldPath.split('/').slice(0, -1).join('/');
          const newBase = newPath.split('/').slice(0, -1).join('/');
          const metaTime = Date.now();
          const metaUpdate = {};
          metaUpdate[`${oldBase}/_meta/lastModified`] = metaTime;
          metaUpdate[`${newBase}/_meta/lastModified`] = metaTime;
          await update(ref(db), metaUpdate);

          state.currentPath = newPath;
          state.orderData = fullOrderData;
          setupAutoRefresh(newPath);
          showToast(`✅ تم الحفظ ونقل الطلب إلى "${newStatus}"`, 'success');
        } else {
          // ===== تحديث في المسار نفسه =====
          await update(ref(db, oldPath), fullOrderData);

          // تحديث meta
          const base = oldPath.split('/').slice(0, -1).join('/');
          await set(ref(db, `${base}/_meta/lastModified`), Date.now());

          state.orderData = { ...state.orderData, ...fullOrderData };
          showToast('✅ تم الحفظ بنجاح', 'success');
        }

        // تحديث الهستوري محلياً فوراً
        renderHistoryCard(fullOrderData.statusHistory);

        // العودة للقائمة
        localStorage.setItem('forceListRefresh', 'true');
        const lastStatus = localStorage.getItem('currentFilterStatus') || '';
        setTimeout(() => {
          window.location.href = `orders-cards.html${lastStatus ? `?status=${encodeURIComponent(lastStatus)}&t=${Date.now()}` : `?t=${Date.now()}`}`;
        }, 400);

      } catch (err) {
        console.error('خطأ في الحفظ:', err);
        showToast('❌ فشل الحفظ: ' + err.message, 'error');
      } finally {
        showLoader(false);
      }
    }

    // ===== الرجوع =====
    function handleBack() {
      localStorage.setItem('restoreScrollAfterReturn', window.scrollY.toString());
      window.location.replace('dashboard.html');
    }

    // ===== التراجع والإعادة =====
    function recordChange(field, oldVal, newVal) {
      if (oldVal === newVal) return;
      state.historyStack.push({ field, oldVal, newVal });
      state.redoStack = [];
    }

    async function undoChange() {
      const last = state.historyStack.pop();
      if (!last) { showToast('⚠️ لا يوجد ما يمكن التراجع عنه', 'warning'); return; }
      const input = document.getElementById(last.field);
      if (input) {
        input.value = last.oldVal;
        await update(ref(db, state.currentPath), { [last.field]: last.oldVal });
        state.redoStack.push(last);
        showToast('↩️ تم التراجع', 'success');
      }
    }

    async function redoChange() {
      const last = state.redoStack.pop();
      if (!last) { showToast('⚠️ لا يوجد ما يمكن إعادته', 'warning'); return; }
      const input = document.getElementById(last.field);
      if (input) {
        input.value = last.newVal;
        await update(ref(db, state.currentPath), { [last.field]: last.newVal });
        state.historyStack.push(last);
        showToast('↪️ تمت الإعادة', 'success');
      }
    }

    // ===== أزرار الاتصال =====
    function setupContactButtons(phone) {
      if (!phone) return;
      const callBtn = document.getElementById('callBtn'), waBtn = document.getElementById('whatsappBtn');
      if (callBtn) callBtn.href = `tel:${phone}`;
      if (waBtn) waBtn.href = `https://wa.me/${normalizeIraqiPhone(phone)}`;
    }

    // ===== انتظار تحميل المنتجات =====
    async function waitForProducts(timeout = 8000) {
      if (state.allProducts.length > 0) return;
      return new Promise((resolve, reject) => {
        const start = Date.now();
        const check = () => {
          if (state.allProducts.length > 0) resolve();
          else if (Date.now() - start > timeout) reject(new Error('Timeout waiting for products'));
          else setTimeout(check, 100);
        };
        check();
      });
    }

    // ===== التهيئة =====
    async function init() {
      state.orderId = localStorage.getItem('selectedOrder')
        || new URLSearchParams(window.location.search).get('id')
        || new URLSearchParams(window.location.search).get('orderId');

      if (!state.orderId) {
        showToast('❌ رقم الطلب غير موجود', 'error');
        setTimeout(() => window.location.replace('orders-cards.html'), 2000);
        return;
      }

      const loggedUser = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
      state.isAdmin = loggedUser?.role === 'admin' || loggedUser?.isAdmin === true || loggedUser?.username === 'admin';

      // تحميل المنتجات من المستودع
      onValue(ref(db, 'warehouse'), (snap) => {
        if (snap.exists()) state.allProducts = Object.keys(snap.val());
      }, { onlyOnce: true });

      // ربط الأحداث
      document.getElementById('saveBtn')?.addEventListener('click', handleSave);
      document.getElementById('backBtn')?.addEventListener('click', handleBack);
      document.getElementById('addProductBtn')?.addEventListener('click', () => { addExtraProduct(); renderProductTags(); });
      document.getElementById('undoBtn')?.addEventListener('click', undoChange);
      document.getElementById('redoBtn')?.addEventListener('click', redoChange);

      ['code', 'phone1', 'phone2', 'address', 'price', 'quantity', 'notes', 'advertiser'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.dataset.oldValue = el.value;
        el.addEventListener('change', () => {
          const oldVal = el.dataset.oldValue || '';
          const newVal = el.value.replace(/,/g, '');
          recordChange(id, oldVal, newVal);
          el.dataset.oldValue = newVal;
        });
      });

      document.getElementById('price')?.addEventListener('input', updateTotals);
      document.getElementById('quantity')?.addEventListener('input', updateTotals);

      window.history.pushState(null, '', location.href);
      window.addEventListener('popstate', () => window.location.replace('orders-cards.html'));
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoChange(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redoChange(); }
      });

      await loadOrder();
    }

    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('beforeunload', () => { if (changeUnsubscribe) changeUnsubscribe(); });
  </script>
</body>
</html>
