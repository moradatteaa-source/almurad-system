<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>لوحة أداء الفريق — المراد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root{
  --navy:#043B64;
  --navy-mid:#0a5a96;
  --navy-dim:#0d3352;
  --orange:#FF6B2D;
  --orange-dim:#e5541c;
  --green:#10B981;
  --green-dim:#059669;
  --red:#EF4444;
  --red-dim:#DC2626;
  --yellow:#F59E0B;
  --yellow-dim:#D97706;
  --blue-accent:#3B82F6;
  --bg:#F1F5F9;
  --card:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --muted:#64748B;
  --sidebar-w:280px;
  --header-h:68px;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(4,59,100,.14);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* ══ LAYOUT ══ */
.layout{display:block;min-height:100vh;position:relative}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sidebar-w);
  background:var(--navy);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;right:0;bottom:0;
  z-index:200;
  transition:transform .3s ease;
  overflow:hidden;
}
.sidebar-brand{
  padding:22px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
.sidebar-brand .logo{
  display:flex;align-items:center;gap:10px;
}
.sidebar-brand .logo-icon{
  width:40px;height:40px;
  background:var(--orange);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.sidebar-brand h1{font-size:15px;font-weight:800;line-height:1.2}
.sidebar-brand p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

.sidebar-nav{
  padding:14px 12px 10px;
  flex-shrink:0;
}
.nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:6px}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:10px 12px;
  border:none;background:transparent;color:rgba(255,255,255,.7);
  border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:600;text-align:right;
  transition:all .2s;margin-bottom:2px;
}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:var(--orange);color:#fff}
.nav-btn .icon{font-size:16px;flex-shrink:0}

.sidebar-employees{
  flex:1;overflow-y:auto;padding:0 12px 12px;
}
.emp-section-label{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.8px;
  padding:10px 8px 6px;
}
.emp-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;border-radius:10px;cursor:pointer;
  transition:all .2s;margin-bottom:2px;
  border:1px solid transparent;
}
.emp-item:hover{background:rgba(255,255,255,.06)}
.emp-item.selected{background:rgba(255,107,45,.15);border-color:rgba(255,107,45,.3)}
.emp-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;color:#fff;
}
.emp-info{flex:1;min-width:0}
.emp-name{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.score-pill{
  font-size:11px;font-weight:800;
  padding:2px 8px;border-radius:20px;flex-shrink:0;
}
.score-great{background:rgba(16,185,129,.2);color:#34D399}
.score-good{background:rgba(59,130,246,.2);color:#60A5FA}
.score-avg{background:rgba(245,158,11,.2);color:#FCD34D}
.score-low{background:rgba(239,68,68,.2);color:#F87171}

/* ══ MAIN ══ */
.main{
  margin-right:var(--sidebar-w);
  display:flex;flex-direction:column;min-height:100vh;
  min-width:0;overflow-x:hidden;
}

/* ══ TOPBAR ══ */
.topbar{
  height:var(--header-h);
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 24px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 0 rgba(0,0,0,.06);
}
.menu-toggle{
  display:none;
  width:36px;height:36px;border:none;background:transparent;
  cursor:pointer;border-radius:8px;font-size:20px;align-items:center;justify-content:center;
}
.topbar-title{font-size:16px;font-weight:800;color:var(--navy);flex:1}
.topbar-title span{color:var(--orange)}
.filter-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.filter-input{
  padding:7px 12px;border:1.5px solid var(--border);
  border-radius:9px;font-family:'Tajawal',sans-serif;
  font-size:13px;color:var(--text);background:#fff;
  transition:border-color .2s;
}
.filter-input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,45,.1)}
.apply-btn{
  padding:8px 16px;background:var(--orange);color:#fff;
  border:none;border-radius:9px;font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;
}
.apply-btn:hover{background:var(--orange-dim)}
.apply-btn:active{transform:scale(.97)}

/* ══ CONTENT ══ */
.content{padding:24px;flex:1;min-width:0;overflow-x:hidden}

/* ══ SELECTED EMPLOYEE BANNER ══ */
.emp-banner{
  background:var(--navy);color:#fff;
  border-radius:var(--radius);padding:18px 22px;
  display:flex;align-items:center;gap:16px;
  margin-bottom:22px;
}
.emp-banner-avatar{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;flex-shrink:0;
}
.emp-banner-info h2{font-size:18px;font-weight:800}
.emp-banner-info p{font-size:12px;color:rgba(255,255,255,.55);margin-top:3px}
.emp-banner-score{
  margin-right:auto;text-align:center;
}
.emp-banner-score .score-num{font-size:36px;font-weight:900;color:var(--orange);line-height:1}
.emp-banner-score .score-lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}

/* ══ KPI GRID ══ */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;margin-bottom:22px;
}
.kpi-card{
  background:var(--card);border-radius:var(--radius);
  padding:16px;border:1px solid var(--border);
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;right:0;
  width:3px;height:100%;
}
.kpi-card.c-total::before{background:var(--blue-accent)}
.kpi-card.c-fixed::before{background:var(--muted)}
.kpi-card.c-transit::before{background:var(--yellow)}
.kpi-card.c-done::before{background:var(--green)}
.kpi-card.c-return::before{background:var(--orange)}
.kpi-card.c-reject::before{background:var(--red)}
.kpi-icon{font-size:20px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:5px}
.kpi-badge{
  display:inline-block;margin-top:6px;
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;
}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-yellow{background:#FEF3C7;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-gray{background:#F1F5F9;color:#475569}

/* ══ CHART ROW ══ */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.chart-card{
  background:var(--card);border-radius:var(--radius);
  padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);
}
.chart-card h3{
  font-size:14px;font-weight:800;color:var(--navy);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.chart-card h3 span{font-weight:400;font-size:12px;color:var(--muted)}
.chart-wrap{position:relative;height:260px}

/* ══ RANKING TABLE ══ */
.section-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);
  margin-bottom:20px;overflow:hidden;
}
.section-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
}
.section-header h3{font-size:14px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px}
.section-header p{font-size:12px;color:var(--muted)}
.sort-pills{display:flex;gap:6px;flex-wrap:wrap}
.sort-pill{
  padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);
  background:#fff;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:.2s;
}
.sort-pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.sort-pill:hover:not(.active){border-color:var(--navy);color:var(--navy)}

.rank-table{width:100%;border-collapse:collapse}
.rank-table th{
  background:#F8FAFC;color:var(--navy);font-size:12px;font-weight:700;
  padding:11px 16px;text-align:center;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.rank-table td{
  padding:12px 16px;text-align:center;
  border-bottom:1px solid #F1F5F9;font-size:13px;
  vertical-align:middle;
}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:#FAFBFD}
.rank-table tr.top-1 td:first-child::before{content:'🥇 ';font-size:14px}
.rank-table tr.top-2 td:first-child::before{content:'🥈 ';font-size:14px}
.rank-table tr.top-3 td:first-child::before{content:'🥉 ';font-size:14px}

.emp-cell{display:flex;align-items:center;gap:10px;text-align:right}
.emp-cell-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
}
.emp-cell-name{font-weight:700;font-size:13px;color:var(--navy)}
.emp-cell-sub{font-size:11px;color:var(--muted)}

.bar-cell{display:flex;align-items:center;gap:8px}
.mini-bar-wrap{flex:1;height:6px;background:#F1F5F9;border-radius:3px;overflow:hidden;min-width:60px}
.mini-bar{height:100%;border-radius:3px;transition:.6s}
.bar-val{font-size:12px;font-weight:700;white-space:nowrap;min-width:36px;text-align:left}

.score-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;margin:auto;
  border:2.5px solid;
}

/* ══ ORDERS TABLE ══ */
.orders-wrap{overflow-x:auto}
.orders-table{width:100%;border-collapse:collapse;min-width:750px}
.orders-table th{
  background:#F8FAFC;color:var(--navy);font-size:12px;font-weight:700;
  padding:10px 14px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;
}
.orders-table td{
  padding:10px 14px;text-align:center;font-size:12px;
  border-bottom:1px solid #F1F5F9;vertical-align:middle;
}
.orders-table tr:last-child td{border-bottom:none}
.orders-table tr:hover td{background:#FAFBFD}
.status-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.s-done{background:#D1FAE5;color:#065F46}
.s-transit{background:#FEF3C7;color:#92400E}
.s-return{background:#FED7AA;color:#9A3412}
.s-ret-done{background:#E0E7FF;color:#3730A3}
.s-reject{background:#FEE2E2;color:#991B1B}
.s-fixed{background:#F1F5F9;color:#475569}
.s-other{background:#F1F5F9;color:#475569}

/* ══ COMMISSION SECTION ══ */
.comm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:16px 20px}
.comm-item{
  display:flex;align-items:center;gap:10px;
  background:#F8FAFC;border-radius:10px;padding:12px;border:1px solid var(--border);
}
.comm-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;flex-shrink:0;
}
.comm-name{font-size:13px;font-weight:700;color:var(--navy)}
.comm-input{
  width:80px;margin-right:auto;
  padding:6px 8px;border:1.5px solid var(--border);
  border-radius:8px;font-family:'Tajawal',sans-serif;
  font-size:13px;text-align:center;
}
.comm-input:focus{outline:none;border-color:var(--orange)}
.save-btn{
  display:flex;align-items:center;gap:8px;
  margin:0 20px 16px;padding:11px 22px;
  background:var(--green);color:#fff;border:none;
  border-radius:10px;font-family:'Tajawal',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:.2s;
}
.save-btn:hover{background:var(--green-dim)}

/* ══ INSIGHT BOX ══ */
.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.insight-card{
  background:var(--card);border-radius:var(--radius);
  padding:16px 18px;border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.insight-card .insight-icon{font-size:22px;margin-bottom:8px}
.insight-card h4{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:4px}
.insight-card .insight-val{font-size:18px;font-weight:900;color:var(--navy)}
.insight-card .insight-sub{font-size:11px;color:var(--muted);margin-top:3px}
.insight-highlight{border-color:var(--orange);background:linear-gradient(135deg,#fff 60%,rgba(255,107,45,.04))}

/* ══ EMPTY / LOADING ══ */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .e-icon{font-size:44px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:15px}

/* ══ MOBILE OVERLAY ══ */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;
}

/* ══ TABS ══ */
.tabs{display:flex;gap:2px;background:#F1F5F9;border-radius:12px;padding:4px;margin-bottom:20px;width:fit-content}
.tab{
  padding:8px 18px;border-radius:9px;border:none;background:transparent;
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:.2s;white-space:nowrap;
}
.tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ══ TOAST ══ */
.toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999}
.toast{
  padding:12px 20px;border-radius:12px;color:#fff;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,.2);margin-top:8px;
  animation:toastIn .3s ease;
}
.toast.success{background:var(--green)}
.toast.info{background:var(--navy)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ══ RESPONSIVE ══ */
@media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.main{margin-right:var(--sidebar-w)}}
@media(max-width:1024px){:root{--sidebar-w:240px}.kpi-grid{grid-template-columns:repeat(3,1fr)}.chart-row{grid-template-columns:1fr}}
@media(max-width:900px){:root{--sidebar-w:220px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.insights{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.open{display:block}.main{margin-right:0 !important;width:100% !important}.menu-toggle{display:flex}.topbar{padding:10px 14px;gap:6px;height:auto;min-height:56px;flex-wrap:wrap}.topbar-title{font-size:14px;width:100%}.filter-group{width:100%;justify-content:flex-start}.filter-input{font-size:12px;padding:6px 10px}.apply-btn{font-size:12px;padding:6px 12px}.content{padding:12px}.kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}.kpi-val{font-size:20px}.chart-row{grid-template-columns:1fr;gap:12px}.chart-wrap{height:220px}.insights{grid-template-columns:1fr;gap:8px}.emp-banner{flex-wrap:wrap;gap:10px;padding:14px}.comm-grid{grid-template-columns:1fr 1fr}.section-header{flex-direction:column;align-items:flex-start}.sort-pills{width:100%;overflow-x:auto;padding-bottom:4px;flex-wrap:nowrap}.sort-pill{white-space:nowrap;font-size:10px;padding:4px 10px}}
@media(max-width:480px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.filter-label{display:none}.comm-grid{grid-template-columns:1fr}.insights{grid-template-columns:1fr}.kpi-val{font-size:18px}.kpi-card{padding:12px}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

<!-- ══════════════ SIDEBAR ══════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div>
        <h1>لوحة الأداء</h1>
        <p>نظام المراد</p>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="nav-label">العرض</div>
    <button class="nav-btn active" id="navAll" onclick="selectAll()">
      <span class="icon">👥</span> كل الفريق
    </button>
  </div>

  <div class="sidebar-employees">
    <div class="emp-section-label">الموظفون</div>
    <div id="empList"><div style="color:rgba(255,255,255,.4);font-size:12px;padding:8px">جارٍ التحميل...</div></div>
  </div>
</aside>

<!-- ══════════════ MAIN ══════════════ -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="topbar-title" id="topbarTitle">كل <span>الفريق</span></div>
    <div class="filter-group">
      <span class="filter-label">من:</span>
      <input type="date" class="filter-input" id="fromDate"/>
      <span class="filter-label">إلى:</span>
      <input type="date" class="filter-input" id="toDate"/>
      <button class="apply-btn" onclick="applyFilters()">تطبيق</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent">
    <div class="loading">⏳ جارٍ تحميل البيانات...</div>
  </div>

</div><!-- /main -->
</div><!-- /layout -->

<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const config = {
  apiKey:"AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
  authDomain:"almurad-system.firebaseapp.com",
  databaseURL:"https://almurad-system-default-rtdb.firebaseio.com/",
  projectId:"almurad-system"
};
const app = initializeApp(config);
const db  = getDatabase(app);

/* ── STATE ── */
let allOrders = [];
let selectedUser = null; // null = all
let commissionRates = JSON.parse(localStorage.getItem("commRates") || "{}");
let sortKey = "score";
let chartBar = null, chartDoughnut = null;

/* ── COLORS ── */
const COLORS = [
  "#FF6B2D","#3B82F6","#10B981","#F59E0B","#8B5CF6",
  "#EF4444","#06B6D4","#EC4899","#84CC16","#F97316",
  "#6366F1","#14B8A6","#FBBF24","#A855F7","#22D3EE"
];
function colorFor(name, i) {
  if(i !== undefined) return COLORS[i % COLORS.length];
  let h = 0;
  for(let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}

/* ── SCORE FORMULA ── */
function calcScore(del, ret, rej, total, outgoing) {
  if(!total) return 0;
  // الطالع = قيد التوصيل + تسليم + راجع + تم استلام الراجع
  // الراجع الكلي = راجع + تم استلام الراجع (مجموعين)
  // النسب:
  const delRate = outgoing ? (del / outgoing) : 0; // تسليم من الطالع
  const retRate = outgoing ? (ret / outgoing) : 0; // راجع كلي من الطالع
  const rejRate = total    ? (rej / total)    : 0; // رفض من الإجمالي

  const raw = (delRate * 55) - (retRate * 35) - (rejRate * 10);
  return Math.max(0, Math.min(100, Math.round(raw * 100)));
}
function scoreClass(s) {
  if(s >= 75) return "score-great";
  if(s >= 55) return "score-good";
  if(s >= 35) return "score-avg";
  return "score-low";
}
function scoreColor(s) {
  if(s >= 75) return "#10B981";
  if(s >= 55) return "#3B82F6";
  if(s >= 35) return "#F59E0B";
  return "#EF4444";
}

/* ── PARSE ORDERS ── */
function parseEmployee(orders) {
  const counts = {
    total: 0,
    fixed: 0,
    transit: 0,
    done: 0,
    ret: 0,
    retDone: 0,
    rej: 0,
    outgoing: 0
  };
  const products = {};
  const cities   = {};

  orders.forEach(o => {
    const st = (o.status || "").trim();
    counts.total++;
    if(st === "مثبت")                  counts.fixed++;
    if(st === "قيد التوصيل")           counts.transit++;
    if(st === "تم التسليم")            counts.done++;
    if(st === "راجع")                  counts.ret++;
    if(st === "تم استلام الراجع")      counts.retDone++;
if(st === "رفض")                   counts.rej++;
    if(["قيد التوصيل","تم التسليم","راجع","تم استلام الراجع"].includes(st))
      counts.outgoing++;
    if(o.productName) products[o.productName] = (products[o.productName]||0)+1;
    if(o.city)        cities[o.city]          = (cities[o.city]||0)+1;
  });

  const totalRet  = counts.ret + counts.retDone;
  const score     = calcScore(counts.done, totalRet, counts.rej, counts.total, counts.outgoing);
  const delRate   = counts.total   ? ((counts.done / counts.total)     * 100).toFixed(1) : "0.0";
  const retRate   = counts.outgoing? ((totalRet    / counts.outgoing)  * 100).toFixed(1) : "0.0";
  const rejRate   = counts.total   ? ((counts.rej  / counts.total)     * 100).toFixed(1) : "0.0";

  const bestProduct = Object.entries(products).sort((a,b)=>b[1]-a[1])[0];
  const bestCity    = Object.entries(cities).sort((a,b)=>b[1]-a[1])[0];

  return { ...counts, totalRet, score, delRate, retRate, rejRate, bestProduct, bestCity };
}

/* ── FIREBASE LOAD ── */
onValue(ref(db, "ordersTest"), snap => {
  if(!snap.exists()){ renderEmpty(); return; }
  allOrders = [];
  const raw = snap.val();

  // الهيكل: ordersTest/حالة/id → طلب
  // أو: ordersTest/id → طلب مباشرة
  // نتعامل مع الحالتين
  Object.entries(raw).forEach(([key, val]) => {
    if(val && typeof val === "object") {
      // إذا الـ value فيه حقول طلب مباشرة (code, fixedBy...)
      if(val.fixedBy !== undefined || val.code !== undefined || val.productName !== undefined) {
        // طلب مباشر
        allOrders.push({ ...val, status: val.status || key });
      } else {
        // مجلد حالة — كل عنصر داخله طلب
        Object.entries(val).forEach(([orderId, order]) => {
          if(order && typeof order === "object") {
            allOrders.push({ ...order, status: order.status || key });
          }
        });
      }
    }
  });

  if(allOrders.length === 0){ renderEmpty(); return; }
  buildSidebar();
  render();
});

/* ── SIDEBAR ── */
function buildSidebar() {
  const users = [...new Set(allOrders.map(o => o.fixedBy || "غير محدد"))];
  const userStats = users.map((u, i) => {
    const orders = allOrders.filter(o => (o.fixedBy||"غير محدد") === u);
    const st = parseEmployee(orders);
    return { name: u, ...st, color: colorFor(u, i) };
  }).sort((a,b) => b.score - a.score);

  const list = document.getElementById("empList");
  list.innerHTML = userStats.map(u => `
    <div class="emp-item" id="emp_${CSS.escape(u.name)}" onclick="selectUser('${u.name}')">
      <div class="emp-avatar" style="background:${u.color}">${u.name[0]}</div>
      <div class="emp-info">
        <div class="emp-name">${u.name}</div>
        <div class="emp-sub">${u.done} تسليم · ${u.total} طلب</div>
      </div>
      <span class="score-pill ${scoreClass(u.score)}">${u.score}</span>
    </div>
  `).join("");
}

/* ── SELECTION ── */
window.selectAll = function() {
  selectedUser = null;
  document.querySelectorAll(".emp-item").forEach(el => el.classList.remove("selected"));
  document.getElementById("navAll").classList.add("active");
  document.getElementById("topbarTitle").innerHTML = "كل <span>الفريق</span>";
  render();
};

window.selectUser = function(name) {
  selectedUser = name;
  document.querySelectorAll(".emp-item").forEach(el => el.classList.remove("selected"));
  const el = document.getElementById("emp_" + CSS.escape(name));
  if(el) el.classList.add("selected");
  document.getElementById("navAll").classList.remove("active");
  document.getElementById("topbarTitle").innerHTML = `أداء <span>${name}</span>`;
  render();
  // close sidebar on mobile
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
};

/* ── FILTERS ── */
window.applyFilters = function() { render(); };

function getFiltered() {
  const from = document.getElementById("fromDate").value ? new Date(document.getElementById("fromDate").value + "T00:00:00") : null;
  const to   = document.getElementById("toDate").value   ? new Date(document.getElementById("toDate").value   + "T23:59:59") : null;
  return allOrders.filter(o => {
    const dt = new Date(o.updatedAt || o.orderDate || Date.now());
    if(from && dt < from) return false;
    if(to   && dt > to)   return false;
    if(selectedUser && (o.fixedBy||"غير محدد") !== selectedUser) return false;
    return true;
  });
}

/* ── RENDER MAIN ── */
function render() {
  const filtered = getFiltered();
  if(selectedUser) renderSingle(filtered, selectedUser);
  else             renderAll(filtered);
}

        <div class="insight-icon">💰</div>
        <h4>العمولة المستحقة</h4>
        <div class="insight-val">${commission.toLocaleString()} د.ع</div>
        <div class="insight-sub">${commissionRates[userName]||250} د.ع × ${st.done} طلب مُسلَّم</div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">🔥</div>
        <h4>أفضل منتج</h4>
        <div class="insight-val" style="font-size:14px">${st.bestProduct?.[0]||"-"}</div>
        <div class="insight-sub">${st.bestProduct?.[1]||0} طلب</div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">📍</div>
        <h4>أكثر مدينة</h4>
        <div class="insight-val" style="font-size:14px">${st.bestCity?.[0]||"-"}</div>
        <div class="insight-sub">${st.bestCity?.[1]||0} طلب</div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="chart-row">
      <div class="chart-card">
        <h3>🍩 توزيع الحالات</h3>
        <div class="chart-wrap"><canvas id="chartDoughnut"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 مقارنة النسب <span>(%)</span></h3>
        <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
      </div>
    </div>

    <!-- ORDERS TABLE -->
    <div class="section-card">
      <div class="section-header">
        <h3>📋 تفاصيل الطلبات</h3>
        <p>${filtered.length} طلب</p>
      </div>
      <div class="orders-wrap">
        <table class="orders-table">
          <thead>
            <tr>
              <th>#</th><th>الكود</th><th>المنتج</th><th>السعر</th>
              <th>المدينة</th><th>الحالة</th><th>التاريخ</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.slice(0,200).map((o, i) => {
              const dt = new Date(o.updatedAt||o.orderDate||0);
              const st2 = o.status?.trim()||"";
              const badge = st2==="تم التسليم"  ?"s-done"
                          : st2==="قيد التوصيل" ?"s-transit"
                          : st2==="راجع"         ?"s-return"
                          : st2==="تم استلام الراجع"?"s-ret-done"
                          : st2==="رفض"          ?"s-reject"
                          : st2==="مثبت"         ?"s-fixed"
                          : "s-other";
              return `<tr>
                <td>${i+1}</td>
                <td style="font-family:monospace;font-size:11px">${o.code||"-"}</td>
                <td style="text-align:right;font-weight:600">${o.productName||"-"}</td>
                <td>${(o.price||0).toLocaleString()}</td>
                <td>${o.city||"-"}</td>
                <td><span class="status-badge ${badge}">${st2||"-"}</span></td>
                <td style="font-size:11px;color:var(--muted)">${dt.getFullYear()>2000?dt.toLocaleDateString("ar-EG"):"-"}</td>
              </tr>`;
            }).join("")}
            ${sorted.length>200?`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:12px">... و ${sorted.length-200} طلب آخر</td></tr>`:""}
          </tbody>
        </table>
      </div>
    </div>
  `;

  // doughnut
  const dCtx = document.getElementById("chartDoughnut")?.getContext("2d");
  if(dCtx) {
    if(chartDoughnut) chartDoughnut.destroy();
    chartDoughnut = new Chart(dCtx, {
      type:"doughnut",
      data:{
        labels:["تم التسليم","قيد التوصيل","راجع","تم استلام الراجع","رفض","مثبت"],
        datasets:[{ data:[st.done,st.transit,st.ret,st.retDone,st.rej,st.fixed],
          backgroundColor:["#10B981","#F59E0B","#FF6B2D","#8B5CF6","#EF4444","#64748B"],
          borderWidth:2, borderColor:"#fff" }]
      },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:"62%",
        plugins:{ legend:{ position:"bottom", labels:{ font:{family:"Tajawal"}, boxWidth:12 } } }
      }
    });
  }

  // bar (rates)
  const bCtx = document.getElementById("chartBar")?.getContext("2d");
  if(bCtx) {
    if(chartBar) chartBar.destroy();
    chartBar = new Chart(bCtx, {
      type:"bar",
      data:{
        labels:["% التسليم","% الراجع","% الرفض"],
        datasets:[{ label:"النسبة %",
          data:[parseFloat(st.delRate), parseFloat(st.retRate), parseFloat(st.rejRate)],
          backgroundColor:["#10B981","#F59E0B","#EF4444"],
          borderRadius:6
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false, indexAxis:"y",
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ max:100, ticks:{ callback:v=>v+"%" } },
          y:{ ticks:{ font:{family:"Tajawal",size:13} } }
        }
      }
    });
  }
}

/* ── SORT ── */
window.setSort = function(key) {
  sortKey = key;
  render();
};

/* ── COMMISSIONS ── */
window.saveCommissions = function() {
  const inputs = document.querySelectorAll(".comm-input");
  inputs.forEach(inp => {
    const name = inp.id.replace("rate_","");
    commissionRates[name] = Number(inp.value) || 0;
  });
  localStorage.setItem("commRates", JSON.stringify(commissionRates));
  toast("✅ تم حفظ العمولات بنجاح", "success");
  render();
};

/* ── TOAST ── */
function toast(msg, type="info") {
  const c = document.getElementById("toastContainer");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ── EMPTY ── */
function renderEmpty() {
  document.getElementById("mainContent").innerHTML = `
    <div class="empty-state">
      <div class="e-icon">📭</div>
      <p>لا توجد طلبات في قاعدة البيانات</p>
    </div>`;
}

/* ── MOBILE SIDEBAR ── */
document.getElementById("menuToggle").onclick = () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
};
document.getElementById("sidebarOverlay").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
};
</script>
</body>
</html>
