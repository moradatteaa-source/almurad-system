<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 إحصائيات المعلنين - نظام المراد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #043B64;
      --orange: #FF6B2D;
      --bg: #f4f6fa;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--blue);
      margin: 0;
      padding: 0;
    }
    header {
      background: var(--blue);
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }
    .container {
      max-width: 1250px;
      margin: 25px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    select, input[type=date], input[type=number], button {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-family: 'Tajawal';
      font-size: 14px;
    }
    button {
      background: var(--blue);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: var(--orange); }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .card {
      background: var(--bg);
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .card h3 {
      margin: 0;
      font-size: 15px;
      color: var(--blue);
    }
    .card p {
      font-size: 20px;
      font-weight: bold;
      color: var(--orange);
      margin: 5px 0 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid #eee;
      padding: 8px;
      text-align: center;
    }
    th {
      background: var(--blue);
      color: white;
      position: sticky;
      top: 0;
    }
    .section-title {
      margin: 20px 0 10px;
      color: var(--blue);
      font-weight: bold;
    }
    @media(max-width:900px) {
      .filters { flex-direction: column; align-items: flex-start; }
    }
    /* ✅ تصميم قائمة الحالات المنسدلة */
.dropdown { position: relative; display: inline-block; }
.dropbtn {
  background: var(--blue);
  color: white;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Tajawal';
}
.dropdown-content {
  display: none;
  position: absolute;
  background-color: white;
  min-width: 180px;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  z-index: 5;
}
.dropdown-content label {
  display: block;
  margin: 4px 0;
  cursor: pointer;
}
.dropdown:hover .dropdown-content {
  display: block;
}
#productDropdown {
  max-height: 250px;
  overflow-y: auto;
}
#productSearch {
  font-family: 'Tajawal';
  font-size: 13px;
}

  </style>
</head>
<body>
  <header>📊 إحصائيات المعلنين - نظام المراد</header>
  <div class="container">

    <div class="filters">
<div class="dropdown">
  <button class="dropbtn">👤 المعلنين</button>
  <div class="dropdown-content" id="advertiserDropdown">
    <label><input type="checkbox" id="selectAllAdvertisers"> ✅ تحديد الكل</label>
    <div id="advertiserCheckboxes"></div>
  </div>
</div>
<div class="dropdown">
  <button class="dropbtn">🧾 الحالات</button>
  <div class="dropdown-content" id="statusCheckboxes">
    <label><input type="checkbox" id="selectAllStatuses"> ✅ تحديد الكل</label>
    <label><input type="checkbox" value="مثبت"> مثبت</label>
    <label><input type="checkbox" value="قيد التوصيل"> قيد التوصيل</label>
    <label><input type="checkbox" value="تم التسليم"> تم التسليم</label>
    <label><input type="checkbox" value="راجع"> راجع</label>
    <label><input type="checkbox" value="تم استلام الراجع"> تم استلام الراجع</label>
    <label><input type="checkbox" value="رفض"> رفض</label>
  </div>
</div>


<div class="dropdown">
  <button class="dropbtn">📦 المنتجات</button>
  <div class="dropdown-content" id="productDropdown">
    <input type="text" id="productSearch" placeholder="🔍 بحث..." style="width:100%;padding:6px 8px;margin-bottom:8px;border:1px solid #ccc;border-radius:6px;">
    <label><input type="checkbox" id="selectAllProducts"> ✅ تحديد الكل</label>
    <div id="productCheckboxes"></div>
  </div>
</div>

      <input type="date" id="fromDate">
      <input type="date" id="toDate">
      <input type="number" id="adCost" placeholder="💸 كلفة الإعلان" min="0" style="width:140px">
      <button id="applyBtn">تطبيق</button>
      <button id="exportExcel">📁 تصدير Excel</button>
    </div>

    <div class="cards">
      <div class="card"><h3>📦 إجمالي الطلبات</h3><p id="totalOrders">0</p></div>
      <div class="card"><h3>✅ تم التسليم</h3><p id="deliveredCount">0</p></div>
      <div class="card"><h3>↩️ الراجع</h3><p id="returnedCount">0</p></div>
      <div class="card"><h3>💰 المبيعات الكلية</h3><p id="totalSales">0</p></div>
      <div class="card"><h3>💵 كلفة الشراء</h3><p id="totalBuy">0</p></div>
      <div class="card"><h3>🚚 كلفة التوصيل</h3><p id="deliveryCost">0</p></div>
      <div class="card"><h3>📣 كلفة الإعلان</h3><p id="adCostDisplay">0</p></div>
      <div class="card"><h3>📈 الربح الصافي</h3><p id="profit">0</p></div>
    </div>

    <h3 class="section-title">📋 تفاصيل الطلبات</h3>
    <div style="overflow:auto;max-height:400px">
      <table id="ordersTable">
        <thead>
          <tr>
            <th>#</th><th>المعلن</th><th>المنتج</th><th>الكمية</th>
            <th>سعر البيع</th><th>سعر الشراء</th><th>الحالة</th><th>التاريخ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
    authDomain: "almurad-system.firebaseapp.com",
    databaseURL: "https://almurad-system-default-rtdb.firebaseio.com/",
    projectId: "almurad-system",
    storageBucket: "almurad-system.appspot.com",
    messagingSenderId: "911755824405",
    appId: "1:911755824405:web:2bfbd18ddcf038ca48ad1c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);


  const fromDate = document.getElementById("fromDate");
  const toDate = document.getElementById("toDate");
  const tbody = document.querySelector("#ordersTable tbody");

  let allOrders = [], warehouse = {};
// ✅ تحديد كل الحالات بضغطة واحدة
document.addEventListener("change", (e) => {
  if (e.target.id === "selectAllStatuses") {
    const checkAll = e.target.checked;
    document.querySelectorAll("#statusCheckboxes input[type='checkbox']").forEach(c => {
      if (c.id !== "selectAllStatuses") c.checked = checkAll;
    });
    applyFilter();
  }
});
// ✅ تحديد كل المعلنين بضغطة واحدة
document.addEventListener("change", (e) => {
  if (e.target.id === "selectAllAdvertisers") {
    const checkAll = e.target.checked;

    document
      .querySelectorAll("#advertiserCheckboxes input[type='checkbox']")
      .forEach(c => c.checked = checkAll);

    applyFilter();
  }
});
 async function loadData() {
  const ordersSnap = await get(ref(db, "orders"));
  if (ordersSnap.exists()) allOrders = Object.values(ordersSnap.val());

  const warehouseSnap = await get(ref(db, "warehouse"));
  if (warehouseSnap.exists()) warehouse = warehouseSnap.val();

  populateAdvertisers();
  populateProductsForAdvertiser(); // 🔥 الحل — إضافة هذا السطر

  applyFilter();
}


function populateAdvertisers() {
  const advs = [...new Set(allOrders.map(o => o.advertiser || "").filter(Boolean))];

  const container = document.getElementById("advertiserCheckboxes");

  container.innerHTML = advs.map(a =>
    `<label><input type="checkbox" value="${a}"> ${a}</label>`
  ).join('');
}

  document.getElementById("applyBtn").onclick = applyFilter;
  document.getElementById("adCost").oninput = applyFilter;
function populateProductsForAdvertiser() {
 const adv = Array.from(
  document.querySelectorAll("#advertiserCheckboxes input:checked")
).map(c => c.value);
  const products = allOrders
.filter(o => !adv.length || adv.includes(o.advertiser))
    .flatMap(o => (o.productName || "").split("،").map(x => x.trim()))
    .filter(Boolean);

  const uniqueProducts = [...new Set(products)];

  const productContainer = document.getElementById("productCheckboxes");
  productContainer.innerHTML = uniqueProducts.length
    ? uniqueProducts.map(p => `<label><input type="checkbox" value="${p}"> ${p}</label>`).join('')
    : "<p style='font-size:13px;color:#777;text-align:center'>لا توجد منتجات</p>";

  // زر تحديد الكل
  document.getElementById("selectAllProducts").checked = false;
}
// ✅ تحديد كل المنتجات بضغطة واحدة
document.addEventListener("change", (e) => {
  if (e.target.id === "selectAllProducts") {
    const checkAll = e.target.checked;
    document.querySelectorAll("#productCheckboxes input[type='checkbox']").forEach(c => c.checked = checkAll);
    applyFilter();
  }
});

// ✅ بحث داخل قائمة المنتجات
document.getElementById("productSearch").addEventListener("input", (e) => {
  const search = e.target.value.trim();
  document.querySelectorAll("#productCheckboxes label").forEach(label => {
    const text = label.textContent.trim();
    label.style.display = text.includes(search) ? "block" : "none";
  });
});



  function applyFilter() {
const adv = Array.from(
  document.querySelectorAll("#advertiserCheckboxes input:checked")
).map(c => c.value);
const statusFilter = Array.from(document.querySelectorAll("#statusCheckboxes input:checked")).map(c => c.value);
const selectedProducts = Array.from(document.querySelectorAll("#productCheckboxes input:checked")).map(c => c.value);
    const adCost = Number(document.getElementById("adCost").value) || 0;
    const f = fromDate.value ? new Date(fromDate.value) : null;
    const t = toDate.value ? new Date(toDate.value + "T23:59:59") : null;

    let filtered = allOrders.filter(o => {
if (adv.length && !adv.includes(o.advertiser)) return false;
if (statusFilter.length && !statusFilter.includes(o.status)) return false;
  // ✅ فلترة المنتجات تطابق تام (ما تطلع إلا المنتجات المختارة فقط)
  if (selectedProducts.length) {
    const orderProducts = (o.productName || "").split("،").map(x => x.trim());
    const match = orderProducts.some(prod => selectedProducts.includes(prod));
    if (!match) return false;
  }

if (
  selectedProducts.length &&
  !selectedProducts.some(p =>
    (o.productName || "")
      .split("،")              // تفصل المنتجات داخل الطلب
      .map(x => x.trim())      // تشيل الفراغات
      .includes(p)             // تطابق تام للاسم
  )
) return false;
let statusTime = null;

if (o.statusHistory) {
  const history = Object.values(o.statusHistory);

  const match = history.find(h => h && h.time);

  if (match) statusTime = match.time;
}

const d = new Date(statusTime || o.orderDate || o.createdAt || Date.now());
      if (f && d < f) return false;
      if (t && d > t) return false;
      return true;
    });

    if (!filtered.length) {
      tbody.innerHTML = "<tr><td colspan='8'>لا توجد بيانات مطابقة للفلترة</td></tr>";
      updateCards({});
      return;
    }

    const deliveryPerOrder = 4250;
    let totalSales = 0, totalBuy = 0, delivered = 0, returned = 0, totalOrders = filtered.length;
    let rows = "";

    filtered.forEach((order, i) => {
  const status = order.status || "-";
  if (status.includes("راجع")) returned++;
  if (status === "تم التسليم") delivered++;

  const names = (order.productName || "").split("،").map(s => s.trim()).filter(Boolean);
  const unique = [...new Set(names)];

  unique.forEach(p => {

  // تفاصيل المنتج من الطلب (productsDetailed)
  const detail = order.productsDetailed?.find(d => d.name === p);

  const qty = detail?.qty || detail?.quantity || 1; // كمية المنتج
  const sell = detail?.price || 0; // سعر البيع الصحيح من الطلب
  const buy = warehouse[p]?.buyPrice || 0; // سعر الشراء من الـ warehouse

  // حساب المبيعات فقط إذا الحالة ضمن الفلترة
  const saleVal = statusFilter.includes(status) ? sell : 0;

  const buyVal = buy * qty;

  totalSales += saleVal;
  totalBuy += buyVal;

  rows += `<tr>
      <td>${i + 1}</td>
      <td>${order.advertiser || "-"}</td>
      <td>${p}</td>
      <td>${formatNumber(qty)}</td>
      <td>${formatNumber(sell)}</td>
      <td>${formatNumber(buy)}</td>
      <td>${status}</td>
      <td>${new Date(order.orderDate).toLocaleDateString('en-GB')}</td>
  </tr>`;
});


});


    const deliveryCost = totalOrders * deliveryPerOrder;
    const profit = totalSales - totalBuy - deliveryCost - adCost;

    tbody.innerHTML = rows;
    updateCards({ totalOrders, delivered, returned, totalSales, totalBuy, deliveryCost, adCost, profit });
  }
// ✅ دالة لتنسيق الأرقام بالإنكليزي مع فواصل الألوف
function formatNumber(num) {
  return Number(num || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

  function updateCards(v) {
  document.getElementById("totalOrders").textContent = formatNumber(v.totalOrders || 0);
  document.getElementById("deliveredCount").textContent = formatNumber(v.delivered || 0);
  document.getElementById("returnedCount").textContent = formatNumber(v.returned || 0);
  document.getElementById("totalSales").textContent = formatNumber(v.totalSales || 0);
  document.getElementById("totalBuy").textContent = formatNumber(v.totalBuy || 0);
  document.getElementById("deliveryCost").textContent = formatNumber(v.deliveryCost || 0);
  document.getElementById("adCostDisplay").textContent = formatNumber(v.adCost || 0);
  document.getElementById("profit").textContent = formatNumber(v.profit || 0);
}


  // ✅ تصدير ملف Excel بصيغة سليمة (XLSX)
  document.getElementById("exportExcel").onclick = () => {
    const table = document.getElementById("ordersTable");
    let html = '<table border="1">' + table.innerHTML + '</table>';
    const blob = new Blob([`\uFEFF${html}`], { type: "application/vnd.ms-excel" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "advertisers_stats.xls";
    a.click();
  };

  loadData();
</script>
</body>
</html>
