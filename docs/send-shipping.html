<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إرسال الشحنة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f6f6f6;
      padding-top: 70px;
    }
    .header-fixed {
      position: fixed; top: 0; right: 0; left: 0;
      background: #043B64; color: #fff;
      padding: 14px; text-align: center;
      font-size: 18px; font-weight: 700;
      z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .back-arrow {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); font-size: 22px; cursor: pointer;
    }
    .container { padding: 16px; max-width: 700px; margin: 0 auto; }
    .card {
      background: #fff; padding: 18px; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: #043B64; margin-bottom: 12px; }
    label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 6px; }
    select, input {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid #ddd; font-size: 14px; background: #fafbfc;
      outline: none; transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: #043B64; }
    .stats {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;
    }
    .stat-box {
      flex: 1; min-width: 100px; background: #f0f7ff;
      border-radius: 10px; padding: 12px; text-align: center;
      border: 1px solid #d0e8f8;
    }
    .stat-num { font-size: 22px; font-weight: 800; color: #043B64; }
    .stat-label { font-size: 12px; color: #666; margin-top: 2px; }
    .btn {
      width: 100%; padding: 14px; text-align: center;
      border-radius: 12px; border: none; cursor: pointer;
      font-size: 16px; font-weight: 700; margin-top: 10px;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #043B64; color: #fff; }
    .btn-primary:hover { background: #085694; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #043B64; border: 2px solid #043B64; }
    .log-box {
      background: #fff; padding: 14px; min-height: 200px;
      border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow-y: auto; max-height: 400px; font-size: 13px;
    }
    .log-item {
      padding: 7px 0; border-bottom: 1px solid #f0f0f0;
      line-height: 1.5;
    }
    .log-item:last-child { border-bottom: none; }
    .ok  { color: #27ae60; font-weight: 700; }
    .err { color: #e74c3c; font-weight: 700; }
    .info { color: #043B64; font-weight: 600; }
    .warn { color: #e67e22; font-weight: 600; }

    /* Progress bar */
    .progress-wrap {
      background: #ecf0f1; border-radius: 10px;
      height: 10px; margin: 10px 0; overflow: hidden; display: none;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, #043B64, #2980b9);
      transition: width 0.3s; border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="header-fixed">
  <span id="backArrow" class="back-arrow">❮</span>
  <span>إرسال الشحنة</span>
</header>

<!-- نموذج الطباعة (مخفي) -->
<div id="printArea" style="display:none; font-family: 'Tajawal', sans-serif;">
  <div style="width:100%; max-width:380px; margin:auto; padding:20px; border:1px solid #000;">
    <h3 style="text-align:center; margin:0 0 10px;">Shipping Label</h3>
    <div style="font-size:14px; line-height:1.6;">
      <b>Order Nr:</b> <span id="p_orderId"></span><br>
      <b>Tracking Nr:</b> <span id="p_tracking"></span><br>
      <b>Date:</b> <span id="p_date"></span><br><br>
      <b>Shipping Address:</b><br>
      <span id="p_name"></span><br>
      <span id="p_city"></span><br>
      <span id="p_region"></span><br>
      <span id="p_phone"></span><br><br>
      <b>Sender:</b><br>eng-murad-organization<br><br>
      <b>Total:</b> <span id="p_total"></span> د.ع<br>
      <b>Items Quantity:</b> <span id="p_qty"></span><br>
    </div>
    <table style="width:100%; margin-top:15px; border-collapse:collapse;">
      <thead>
        <tr>
          <th style="border:1px solid #000; padding:5px;">Item</th>
          <th style="border:1px solid #000; padding:5px;">Qty</th>
          <th style="border:1px solid #000; padding:5px;">Price</th>
        </tr>
      </thead>
      <tbody id="p_items"></tbody>
    </table>
  </div>
</div>

<div class="container">

  <!-- إعدادات الرفع -->
  <div class="card">
    <div class="card-title">⚙️ إعدادات الشحن</div>
    <label>شركة الشحن:</label>
    <select id="shippingCompany">
      <option value="prime" selected>🚀 برايم</option>
      <option value="waseet">🚚 الوسيط</option>
    </select>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="ordersCount">-</div>
        <div class="stat-label">طلب جاهز للرفع</div>
      </div>
      <div class="stat-box" style="background:#f0fff4; border-color:#c8e6c9;">
        <div class="stat-num" id="successCount" style="color:#27ae60;">0</div>
        <div class="stat-label">ناجح</div>
      </div>
      <div class="stat-box" style="background:#fff5f5; border-color:#ffcdd2;">
        <div class="stat-num" id="failCount" style="color:#e74c3c;">0</div>
        <div class="stat-label">فاشل</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <button id="startUpload" class="btn btn-primary">🚀 إرسال الشحنة</button>
  <button id="viewLogs" class="btn btn-outline" style="margin-top:8px;">📋 عرض سجلات الشحن</button>

  <!-- سجل النشاط -->
  <h3 style="margin: 16px 0 8px; font-size:15px; color:#043B64;">📄 سجل النشاط</h3>
  <div id="logs" class="log-box">
    <div class="log-item info">في انتظار بدء العملية...</div>
  </div>

</div>

<script src="./waseetCities.js"></script>
<script src="./waseetRegions.js"></script>

<script type="module">
import { sendOrdersToWaseet, loginToWaseet } from "./deliveryService.js";
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

// ============================================================
// Firebase
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
  authDomain: "almurad-system.firebaseapp.com",
  databaseURL: "https://almurad-system-default-rtdb.firebaseio.com",
  projectId: "almurad-system",
  storageBucket: "almurad-system.appspot.com",
  messagingSenderId: "911755824405",
  appId: "1:911755824405:web:2bfbd18ddcf038ca48ad1c"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ============================================================
// متغيرات
// ============================================================
let readyOrders = [];
let successCount = 0;
let failCount    = 0;

// ============================================================
// مساعدات
// ============================================================
function addLog(text, cls = "info") {
  const box = document.getElementById("logs");
  // امسح الرسالة الافتراضية
  if (box.querySelector(".log-item.info")?.textContent.includes("انتظار")) box.innerHTML = "";
  box.innerHTML += `<div class="log-item ${cls}">${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

function updateStats() {
  document.getElementById("successCount").textContent = successCount;
  document.getElementById("failCount").textContent    = failCount;
}

function setProgress(done, total) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
}

function setLoading(v) {
  const btn = document.getElementById("startUpload");
  btn.disabled    = v;
  btn.textContent = v ? "⏳ جاري الرفع..." : "🚀 إرسال الشحنة";
  document.getElementById("progressWrap").style.display = v ? "block" : "none";
}

// ============================================================
// تحميل الطلبات من ordersTest/مثبت
// ============================================================
async function loadOrders() {
  addLog("🔄 جاري تحميل الطلبات المثبتة...");
  try {
    const snap = await get(ref(db, "ordersTest/مثبت"));

    if (!snap.exists()) {
      addLog("ℹ️ لا توجد طلبات في مسار ordersTest/مثبت", "warn");
      document.getElementById("ordersCount").textContent = "0";
      return;
    }

    const data = snap.val();

    // فلترة: نأخذ فقط الطلبات الحقيقية (ليس _meta)
    readyOrders = Object.entries(data)
      .filter(([id]) => id !== "_meta")
      .map(([id, o]) => ({ id, ...o }))
      // تأكيد الحالة "مثبت" فقط
      .filter(o => !o.status || o.status.trim() === "مثبت");

    document.getElementById("ordersCount").textContent = readyOrders.length;

    if (readyOrders.length > 0) {
      addLog(`✅ تم تحميل ${readyOrders.length} طلب جاهز للرفع`, "ok");
    } else {
      addLog("ℹ️ لا توجد طلبات بحالة 'مثبت' جاهزة للرفع", "warn");
    }

  } catch (err) {
    addLog(`❌ خطأ في تحميل الطلبات: ${err.message}`, "err");
  }
}

loadOrders();

// ============================================================
// زر الرفع
// ============================================================
document.getElementById("startUpload").onclick = async () => {
  if (readyOrders.length === 0) {
    addLog("⚠️ لا توجد طلبات مثبتة للرفع", "warn");
    return;
  }

  successCount = 0;
  failCount    = 0;
  updateStats();
  setLoading(true);

  const selectedCompany = document.getElementById("shippingCompany").value;
  addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
  addLog(`🚚 شركة الشحن: ${selectedCompany === "prime" ? "برايم" : "الوسيط"}`);
  addLog(`📦 عدد الطلبات: ${readyOrders.length}`);

  try {

    // ==========================
    // 🟢 الوسيط
    // ==========================
    if (selectedCompany === "waseet") {

      addLog("🔄 تسجيل الدخول للوسيط...");
      const token = await loginToWaseet();

      if (!token) {
        addLog("❌ فشل تسجيل الدخول إلى الوسيط", "err");
        setLoading(false);
        return;
      }
      addLog("✔️ تم تسجيل الدخول — بدء رفع الطلبات", "ok");

      const result = await sendOrdersToWaseet(
        readyOrders,
        window.waseetCities,
        window.waseetRegions
      );

      for (const r of result.results) {
        if (r.success) {
          successCount++;
          addLog(`✔ الطلب #${r.orderId} — وصل: ${r.receiptNum}`, "ok");
        } else {
          failCount++;
          const reason = r.reason || r.response?.message || r.response?.msg || JSON.stringify(r.response || r.error || "");
          addLog(`✖ الطلب #${r.orderId} — فشل: ${reason}`, "err");
        }
        setProgress(successCount + failCount, readyOrders.length);
        updateStats();
      }
    }

    // ==========================
    // 🟣 برايم
    // ==========================
    else if (selectedCompany === "prime") {

      addLog("🔄 بدء رفع الطلبات إلى برايم...");

      for (let i = 0; i < readyOrders.length; i++) {
        const order = readyOrders[i];
        addLog(`⏳ رفع الطلب #${order.id} (${i + 1}/${readyOrders.length})...`);

        try {
          const response = await fetch(
            `https://almurad.onrender.com/api/create-order-prime/${order.id}`,
            { method: "POST" }
          );

          // ✅ تحقق من أن الاستجابة JSON وليست خطأ HTML
          const contentType = response.headers.get("content-type") || "";
          if (!contentType.includes("application/json")) {
            const text = await response.text();
            failCount++;
            addLog(`✖ الطلب #${order.id} — استجابة غير صالحة من السيرفر: ${text.slice(0, 100)}`, "err");
            setProgress(successCount + failCount, readyOrders.length);
            updateStats();
            continue;
          }

          const data = await response.json();

          if (data.success) {
            successCount++;
            addLog(`✔ الطلب #${order.id} — وصل برايم: ${data.shipmentNo}`, "ok");
          } else {
            failCount++;
            // ✅ عرض سبب الفشل بشكل واضح
            const reason = data.msg || data.error || JSON.stringify(data);
            addLog(`✖ الطلب #${order.id} — فشل: ${reason}`, "err");
          }

        } catch (err) {
          failCount++;
          addLog(`✖ الطلب #${order.id} — خطأ شبكة: ${err.message}`, "err");
        }

        setProgress(successCount + failCount, readyOrders.length);
        updateStats();

        // تأخير بسيط بين الطلبات لتجنب الحمل الزائد
        if (i < readyOrders.length - 1) await new Promise(r => setTimeout(r, 300));
      }
    }

  } catch (err) {
    addLog(`❌ خطأ عام: ${err.message}`, "err");
  } finally {
    setLoading(false);
    addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
    addLog(`✅ الناجح: ${successCount} | ❌ الفاشل: ${failCount}`,
      failCount === 0 ? "ok" : successCount === 0 ? "err" : "warn");

    // أعد تحميل الطلبات المتبقية
    if (successCount > 0) {
      addLog("🔄 جاري تحديث قائمة الطلبات...");
      await loadOrders();
    }
  }
};

// ============================================================
// أزرار أخرى
// ============================================================
document.getElementById("viewLogs").onclick = () => {
  window.location.href = "shipping-logs.html";
};

document.getElementById("backArrow").onclick = () => {
  window.location.href = "orders-cards.html?status=مثبت";
};

</script>
</body>
</html>
