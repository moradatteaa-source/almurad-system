async function processBarcode(shipmentId) {

  shipmentId = String(shipmentId).trim();

  scanMsg.textContent = "⏳ جاري البحث...";

const ordersRef = ref(db, "orders");
const q = query(
  ordersRef,
  orderByChild("receiptNum"),
  equalTo(shipmentId)
);

let snap = await get(q);

// إذا لم يجد حاول البحث كرقم
if (!snap.exists()) {
  const q2 = query(
    ordersRef,
    orderByChild("receiptNum"),
    equalTo(Number(shipmentId))
  );
  snap = await get(q2);
}

if (!snap.exists()) {
  scanMsg.textContent = "❌ رقم الوصل غير موجود";
  return;
}
const data = snap.val();
console.log("ORDER DATA:", data);
const foundOrder = Object.values(data)[0] || null;
console.log("ORDER:", foundOrder);
  if (!foundOrder) {
    scanMsg.textContent = "❌ رقم الوصل غير موجود";
    return;
  }

  if (scannedShipments.has(shipmentId)) {
    scanMsg.textContent = "⚠️ هذا الوصل مضاف سابقاً";
    return;
  }

  scannedShipments.add(shipmentId);

for (const p of foundOrder.productsDetailed || []) {

  const productName = p.name || foundOrder.productName || "منتج غير معروف";

  const itemData = {
    name: productName,
qty: (!p.qty || isNaN(Number(p.qty))) ? 1 : Number(p.qty),
    variants: p.variants || {},
    orderId: shipmentId   // ⭐ مهم

const status = (foundOrder.status || "").trim();

  status.includes("توصيل") ||
  status.includes("تجهيز") ||
  status.includes("تم التسليم")
) {

}

// الراجع

  status.includes("راجع")
) {
  pendingReturn.push(itemData);
}
}

function renderPendingTable() {

      return;
    }

    const map = new Map();

    data.forEach(item => {

  .sort(([a],[b]) => a.localeCompare(b))
  .map(([k,v]) => `${k} | ${v}`)

          <td>${data.orders}</td>

      `;
    }

document.addEventListener("keydown", (e) => {

  // تجاهل المفاتيح الخاصة
  if (e.key === "Shift" || e.key === "Control" || e.key === "Alt") return;

  // إذا Enter → اعتبر الباركود انتهى
  if (e.key === "Enter") {

    const code = barcodeBuffer.trim();
    barcodeBuffer = "";

    if (code.length > 3) { // أقل طول باركود
      processBarcode(code);
    }

    return;
  }

  // نجمع الأحرف
  barcodeBuffer += e.key;

  // إعادة تصفير لو توقف الإدخال
  clearTimeout(barcodeTimer);
  barcodeTimer = setTimeout(() => {
    barcodeBuffer = "";
  }, 200); // لو توقف أكثر من 200ms يعتبر إدخال يدوي
});
function findMatchingVariant(stock, variantText){

const normalize = (text)=>
text
.split("|")
.map(s=>s.trim())
.filter(Boolean)
.sort()
.join("|");

const target = normalize(variantText);

for(const key of Object.keys(stock)){

if(normalize(key) === target){
return key;
}

}

return null;

}

function fixArabicText(text) {
  if (!text) return "";

  return text
    .replace(/\s+/g, " ")
    .trim()
    .split(/([\u0600-\u06FF]+)/)
    .map(part => {
      if (/[\u0600-\u06FF]+/.test(part)) {
        return part.split(" ").reverse().join(" ");
      }
      return part;
    })
    .reverse()
    .join(" ")
    .replace(/\s+/g, " ");
}
