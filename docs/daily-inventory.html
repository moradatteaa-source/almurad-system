const barcodeInput = document.getElementById("barcodeInput");
const outTable = document.querySelector("#outTable tbody");
const returnTable = document.querySelector("#returnTable tbody");
const outSummary = document.getElementById("outSummary");
const returnSummary = document.getElementById("returnSummary");

const returnSection = document.getElementById("returnSection");

const deductBtn = document.getElementById("deductBtn");
const returnBtn = document.getElementById("returnBtn");
let pendingOut = [];
let pendingReturn = [];
let scannedShipments = new Set();

async function processBarcode(shipmentId) {

  shipmentId = String(shipmentId).trim();

  scanMsg.textContent = "⏳ جاري البحث...";

const ordersRef = ref(db, "orders");
const q = query(
  ordersRef,
  orderByChild("receiptNum"),
  equalTo(shipmentId)
);

const snap = await get(q);

if (!snap.exists()) {
  scanMsg.textContent = "❌ رقم الوصل غير موجود";
  return;
}

const data = snap.val();
const foundOrder = Object.values(data)[0] || null;

  if (!foundOrder) {
    scanMsg.textContent = "❌ رقم الوصل غير موجود";
    return;
  }

  if (scannedShipments.has(shipmentId)) {
    scanMsg.textContent = "⚠️ هذا الوصل مضاف سابقاً";
    return;
  }

  scannedShipments.add(shipmentId);

for (const p of foundOrder.productsDetailed || []) {

  const itemData = {
    name: p.name,
    qty: Number(p.qty),
    variants: p.variants || {}
  };

  if (foundOrder.status === "قيد التجهيز") {
    pendingOut.push(itemData);
  }

  if (foundOrder.status === "راجع") {
    pendingReturn.push(itemData);
  }
}

  renderPendingTable();
  scanMsg.textContent = "✅ تمت إضافة الطلب للجدول";
}
function renderPendingTable() {

  outTable.innerHTML = "";
  returnTable.innerHTML = "";

  outSection.style.display = pendingOut.length ? "block" : "none";
  returnSection.style.display = pendingReturn.length ? "block" : "none";

  const render = (data, table) => {

    if (!data.length) {
      table.innerHTML = `<tr><td colspan="3">لا توجد بيانات</td></tr>`;
      return;
    }

    const map = new Map();

    data.forEach(item => {

      const variants = item.variants || {};
const variantText = Object.entries(variants)
  .map(([k, v]) => `${k} | ${v}`)
  .join(" | ");

      const fullName = variantText
        ? item.name + " - " + variantText
        : item.name;

      if (!map.has(fullName)) {
        map.set(fullName, { orders: 0, qty: 0 });
      }

      const obj = map.get(fullName);
      obj.orders += 1;
      obj.qty += item.qty;
    });

    for (const [name, data] of map.entries()) {
      table.innerHTML += `
        <tr>
          <td>${name}</td>
          <td>${data.orders}</td>
          <td>${data.qty}</td>
        </tr>
      `;
    }
  };

render(pendingOut, outTable);
render(pendingReturn, returnTable);

// حساب المجاميع
let outOrders = pendingOut.length;
let outQty = pendingOut.reduce((sum,i)=>sum+i.qty,0);

let returnOrders = pendingReturn.length;
let returnQty = pendingReturn.reduce((sum,i)=>sum+i.qty,0);

// عرض المجاميع
outSummary.textContent = `عدد الطلبات: ${outOrders} | إجمالي الكمية: ${outQty}`;
if (returnOrders > 0) {
  returnSummary.textContent = `عدد الطلبات: ${returnOrders} | إجمالي الكمية: ${returnQty}`;
} else {
  returnSummary.textContent = "";
}
}

 
let barcodeBuffer = "";
let barcodeTimer = null;
// تشغيل البحث عند الضغط Enter داخل الحقل
barcodeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const code = barcodeInput.value.trim();
    barcodeInput.value = "";

    if (code.length > 3) {
      processBarcode(code);
    }
  }
});
document.addEventListener("keydown", (e) => {

  // تجاهل المفاتيح الخاصة
  if (e.key === "Shift" || e.key === "Control" || e.key === "Alt") return;

  // إذا Enter → اعتبر الباركود انتهى
  if (e.key === "Enter") {

    const code = barcodeBuffer.trim();
    barcodeBuffer = "";

    if (code.length > 3) { // أقل طول باركود
      processBarcode(code);
    }

    return;
  }

  // نجمع الأحرف
  barcodeBuffer += e.key;

  // إعادة تصفير لو توقف الإدخال
  clearTimeout(barcodeTimer);
  barcodeTimer = setTimeout(() => {
    barcodeBuffer = "";
  }, 200); // لو توقف أكثر من 200ms يعتبر إدخال يدوي
});
deductBtn.addEventListener("click", async () => {

if (!pendingOut.length) {
    alert("لا توجد طلبات للخصم");
    return;
  }

  scanMsg.textContent = "⏳ جاري الخصم...";

 const productTotals = new Map();

pendingOut.forEach(item => {
const variants = item.variants || {};
const variantText = Object.entries(variants)
  .map(([k, v]) => `${k} | ${v}`)
  .join(" | ");

  const key = variantText
    ? item.name + " || " + variantText
    : item.name;

  if (!productTotals.has(key)) {
    productTotals.set(key, 0);
  }

  productTotals.set(key, productTotals.get(key) + item.qty);
});

// نجيب المخزن مرة وحدة فقط
const warehouseSnap = await get(child(ref(db), "warehouse"));

if (!warehouseSnap.exists()) {
  scanMsg.textContent = "❌ لا يوجد مخزن";
  return;
}

const warehouseData = warehouseSnap.val();

for (const [fullKey, qty] of productTotals.entries()) {
const parts = fullKey.split(" || ");
const name = parts[0];
const variantPart = parts.length > 1 ? parts[1] : null;

  for (const [key, item] of Object.entries(warehouseData)) {

if (key.toLowerCase().trim() === name.toLowerCase().trim()) {

  const stock = item.stock || {};



  const hasVariants = Object.keys(stock)
    .some(k => k.includes("اللون") || k.includes("القياس"));

  // 🟢 بدون متغيرات
  if (!hasVariants) {

    const currentQty = Number(stock["إجمالي الكمية"] || 0);

    if (currentQty < qty) {
      scanMsg.textContent = `❌ المخزون غير كافي للمنتج: ${name}`;
      return;
    }

    const newQty = currentQty - qty;

    await update(ref(db, "warehouse/" + key), {
      "stock/إجمالي الكمية": newQty,
      totalQty: newQty,
      lastUpdate: new Date().toISOString()
    });

  } else {

    // 🔵 بمتغيرات
// نبني نفس مفتاح المتغير المخزن في warehouse
const variantKey = variantPart ? variantPart.trim() : "";

if (!variantKey) {
  scanMsg.textContent = `❌ المتغير غير محدد للمنتج: ${name}`;
  return;
}

const currentVariantQty = Number(stock[variantKey] || 0);

    if (currentVariantQty < qty) {
      scanMsg.textContent = `❌ المخزون غير كافي للمتغير: ${name}`;
      return;
    }

    const newVariantQty = currentVariantQty - qty;

    const updatedStock = {
      ...stock,
      [variantKey]: newVariantQty
    };

    let total = 0;
    for (const [k, v] of Object.entries(updatedStock)) {
      if (k !== "إجمالي الكمية") {
        total += Number(v) || 0;
      }
    }

    updatedStock["إجمالي الكمية"] = total;

    await update(ref(db, "warehouse/" + key), {
      stock: updatedStock,
      totalQty: total,
      lastUpdate: new Date().toISOString()
    });

  }

  break;
}
  }
}

pendingOut = [];
  scannedShipments.clear();
  renderPendingTable();

  scanMsg.textContent = "✅ تم الخصم بنجاح";
});
 returnBtn.addEventListener("click", async () => {

  }
pendingReturn = [];

function fixArabicText(text) {
  if (!text) return "";

  return text
    .replace(/\s+/g, " ")
    .trim()
    .split(/([\u0600-\u06FF]+)/)
    .map(part => {
      if (/[\u0600-\u06FF]+/.test(part)) {
        return part.split(" ").reverse().join(" ");
      }
      return part;
    })
    .reverse()
    .join(" ")
    .replace(/\s+/g, " ");
}
const pdfBtn = document.getElementById("pdfBtn");

pdfBtn.addEventListener("click", generateInventoryPDF);

async function generateInventoryPDF() {

  if (!pendingOut.length && !pendingReturn.length) {
    alert("لا يوجد بيانات للجرد");
    return;
  }

  // 🔹 تحميل خط Tajawal محلياً مثل الفاتورة
  const res = await fetch("Tajawal-Regular.ttf");
  const buffer = await res.arrayBuffer();
  const binary = Array.from(new Uint8Array(buffer))
    .map(b => String.fromCharCode(b))
    .join("");
  const base64 = btoa(binary);

  pdfMake.vfs = { "Tajawal-Regular.ttf": base64 };
  pdfMake.fonts = {
    Tajawal: {
      normal: "Tajawal-Regular.ttf",
      bold: "Tajawal-Regular.ttf",
      italics: "Tajawal-Regular.ttf",
      bolditalics: "Tajawal-Regular.ttf"
    }
  };

// جدول الطالع
let outBody = [
[
{ text:fixArabicText("ت"), style:"tableHeader", alignment:"center"},
{ text:fixArabicText("المنتج"), style:"tableHeader", alignment:"center"},
{ text:fixArabicText("عدد الطلبات"), style:"tableHeader", alignment:"center"},
{ text:fixArabicText("الكمية"), style:"tableHeader", alignment:"center"}
]
];

// جدول الراجع
let returnBody = [
[
{ text:fixArabicText("ت"), style:"returnHeader", alignment:"center"},
{ text:fixArabicText("المنتج"), style:"returnHeader", alignment:"center"},
{ text:fixArabicText("عدد الطلبات"), style:"returnHeader", alignment:"center"},
{ text:fixArabicText("الكمية"), style:"returnHeader", alignment:"center"}
]
];

const outMap = new Map();
const returnMap = new Map();

// الطالع
pendingOut.forEach(item=>{

const variant = Object.entries(item.variants || {})
  .map(([k,v]) => `${k} | ${v}`)
  .join(" | ");
const name = variant ? item.name+" - "+variant : item.name;

if(!outMap.has(name)){
outMap.set(name,{orders:0,qty:0});
}

const obj = outMap.get(name);
obj.orders+=1;
obj.qty+=item.qty;

});

// الراجع
pendingReturn.forEach(item=>{

const variant = Object.entries(item.variants || {})
  .map(([k,v]) => `${k} | ${v}`)
  .join(" | ");
const name = variant ? item.name+" - "+variant : item.name;

if(!returnMap.has(name)){
returnMap.set(name,{orders:0,qty:0});
}

const obj = returnMap.get(name);
obj.orders+=1;
obj.qty+=item.qty;

});

// تعبئة الطالع
let i=1;
[...outMap.entries()]
.sort((a,b)=>b[1].qty-a[1].qty)
.forEach(([name,data])=>{

outBody.push([
i++,
fixArabicText(name),
data.orders,
data.qty
]);

});

// تعبئة الراجع
let r=1;
[...returnMap.entries()]
.sort((a,b)=>b[1].qty-a[1].qty)
.forEach(([name,data])=>{

returnBody.push([
r++,
fixArabicText(name),
data.orders,
data.qty
]);

});

// ملخص الطالع
let outOrders = pendingOut.length;
let outProducts = outMap.size;
let outQty = 0;

for(const [,data] of outMap){
outQty += data.qty;
}

// ملخص الراجع
let returnOrders = pendingReturn.length;
let returnProducts = returnMap.size;
let returnQty = 0;

for(const [,data] of returnMap){
returnQty += data.qty;
}
// إضافة صف المجموع للطالع
outBody.push([
"",
fixArabicText("المجموع"),
outOrders,
outQty
]);

// إضافة صف المجموع للراجع
returnBody.push([
"",
fixArabicText("المجموع"),
returnOrders,
returnQty
]);
