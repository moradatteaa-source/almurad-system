<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📅 الجرد اليومي - نظام المراد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f4f6fa;
      color: #043B64;
      margin: 0;
      padding: 0;
    }

    header {
      background: #043B64;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    main {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #043B64;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    button {
      background: #FF6B2D;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 8px 10px;
      text-align: center;
    }

    th {
      background: #043B64;
      color: white;
    }

    .loading {
      color: #FF6B2D;
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      main { padding: 10px; }
      table { font-size: 13px; }
      button { width: 100%; margin-top: 10px; }
    }
  </style>
</head>
<body>

  <header>📅 الجرد اليومي - نظام المراد</header>

  <main>
    <!-- 🟣 قسم الجرد بالباركود -->
<div class="section">
  <h2>📦 جرد بواسطة رقم الوصل</h2>

  <input type="text" 
         id="barcodeInput" 
         placeholder="امسح رقم الوصل هنا..." 
         style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;">

<div id="outSection" style="display:none;">

  <h3>📦 الطلبات الطالعة</h3>
  <table id="outTable">
    <thead>
      <tr>
        <th>المنتج</th>
        <th>عدد الطلبات</th>
        <th>الكمية</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button id="deductBtn"
          style="margin-top:10px;background:#043B64;">
    خصم من المخزن
  </button>

</div>


<div id="returnSection" style="display:none;margin-top:30px;">

  <h3 style="color:#842029;">🔴 الطلبات الراجعة</h3>
  <table id="returnTable" style="background:#fff5f5;">
    <thead>
      <tr>
        <th>المنتج</th>
        <th>عدد الطلبات</th>
        <th>الكمية</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button id="returnBtn"
          style="margin-top:10px;background:#f8d7da;color:#842029;">
    إضافة راجع إلى المخزن
  </button>

</div>
  <p id="scanMsg" class="loading"></p>
</div>
<button id="pdfBtn" style="background:#043B64;margin-top:10px;">
  📄 تحميل تقرير الجرد PDF
</button>
 
  </main>

  <!-- 🔹 سكربت -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { 
  getDatabase, 
  ref, 
  get, 
  update,
  query,
  orderByChild,
  equalTo,
  child
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
    // إعداد Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDtEJYJrmyP45qS2da8Cuc6y6Jv5VD0Uhc",
      authDomain: "almurad-system.firebaseapp.com",
      databaseURL: "https://almurad-system-default-rtdb.firebaseio.com/",
      projectId: "almurad-system",
      storageBucket: "almurad-system.appspot.com",
      messagingSenderId: "911755824405",
      appId: "1:911755824405:web:2bfbd18ddcf038ca48ad1c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);


const barcodeInput = document.getElementById("barcodeInput");
const outTable = document.querySelector("#outTable tbody");
const returnTable = document.querySelector("#returnTable tbody");

const outSection = document.getElementById("outSection");
const returnSection = document.getElementById("returnSection");

const deductBtn = document.getElementById("deductBtn");
const returnBtn = document.getElementById("returnBtn");
let pendingOut = [];
let pendingReturn = [];
let scannedShipments = new Set();

    async function processBarcode(shipmentId) {

  scanMsg.textContent = "⏳ جاري البحث...";

const ordersRef = ref(db, "orders");
const q = query(
  ordersRef,
  orderByChild("receiptNum"),
  equalTo(shipmentId)
);

const snap = await get(q);

if (!snap.exists()) {
  scanMsg.textContent = "❌ رقم الوصل غير موجود";
  return;
}

const data = snap.val();
const foundOrder = Object.values(data)[0];

  if (!foundOrder) {
    scanMsg.textContent = "❌ رقم الوصل غير موجود";
    return;
  }

  if (scannedShipments.has(shipmentId)) {
    scanMsg.textContent = "⚠️ هذا الوصل مضاف سابقاً";
    return;
  }

  scannedShipments.add(shipmentId);

for (const p of foundOrder.productsDetailed || []) {

  const itemData = {
    name: p.name,
    qty: Number(p.qty),
    variants: p.variants || {}
  };

  if (foundOrder.status === "قيد التجهيز") {
    pendingOut.push(itemData);
  }

  if (foundOrder.status === "راجع") {
    pendingReturn.push(itemData);
  }
}

  renderPendingTable();
  scanMsg.textContent = "✅ تمت إضافة الطلب للجدول";
}
function renderPendingTable() {

  outTable.innerHTML = "";
  returnTable.innerHTML = "";

  outSection.style.display = pendingOut.length ? "block" : "none";
  returnSection.style.display = pendingReturn.length ? "block" : "none";

  const render = (data, table) => {

    if (!data.length) {
      table.innerHTML = `<tr><td colspan="3">لا توجد بيانات</td></tr>`;
      return;
    }

    const map = new Map();

    data.forEach(item => {

      const variantText = Object.entries(item.variants || {})
        .map(([k, v]) => v)
        .join(" / ");

      const fullName = variantText
        ? item.name + " - " + variantText
        : item.name;

      if (!map.has(fullName)) {
        map.set(fullName, { orders: 0, qty: 0 });
      }

      const obj = map.get(fullName);
      obj.orders += 1;
      obj.qty += item.qty;
    });

    for (const [name, data] of map.entries()) {
      table.innerHTML += `
        <tr>
          <td>${name}</td>
          <td>${data.orders}</td>
          <td>${data.qty}</td>
        </tr>
      `;
    }
  };

  render(pendingOut, outTable);
  render(pendingReturn, returnTable);
}

 
let barcodeBuffer = "";
let barcodeTimer = null;
// تشغيل البحث عند الضغط Enter داخل الحقل
barcodeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const code = barcodeInput.value.trim();
    barcodeInput.value = "";

    if (code.length > 3) {
      processBarcode(code);
    }
  }
});
document.addEventListener("keydown", (e) => {

  // تجاهل المفاتيح الخاصة
  if (e.key === "Shift" || e.key === "Control" || e.key === "Alt") return;

  // إذا Enter → اعتبر الباركود انتهى
  if (e.key === "Enter") {

    const code = barcodeBuffer.trim();
    barcodeBuffer = "";

    if (code.length > 3) { // أقل طول باركود
      processBarcode(code);
    }

    return;
  }

  // نجمع الأحرف
  barcodeBuffer += e.key;

  // إعادة تصفير لو توقف الإدخال
  clearTimeout(barcodeTimer);
  barcodeTimer = setTimeout(() => {
    barcodeBuffer = "";
  }, 200); // لو توقف أكثر من 200ms يعتبر إدخال يدوي
});
deductBtn.addEventListener("click", async () => {

if (!pendingOut.length) {
    alert("لا توجد طلبات للخصم");
    return;
  }

  scanMsg.textContent = "⏳ جاري الخصم...";

 const productTotals = new Map();

pendingOut.forEach(item => {

  const variantText = Object.entries(item.variants || {})
    .map(([k, v]) => `${k} | ${v}`)
    .join(" | ");

  const key = variantText
    ? item.name + " || " + variantText
    : item.name;

  if (!productTotals.has(key)) {
    productTotals.set(key, 0);
  }

  productTotals.set(key, productTotals.get(key) + item.qty);
});

// نجيب المخزن مرة وحدة فقط
const warehouseSnap = await get(child(ref(db), "warehouse"));

if (!warehouseSnap.exists()) {
  scanMsg.textContent = "❌ لا يوجد مخزن";
  return;
}

const warehouseData = warehouseSnap.val();

for (const [fullKey, qty] of productTotals.entries()) {
const parts = fullKey.split(" || ");
const name = parts[0];
const variantPart = parts.length > 1 ? parts[1] : null;

  for (const [key, item] of Object.entries(warehouseData)) {

if (key.toLowerCase().trim() === name.toLowerCase().trim()) {

  const stock = item.stock || {};

  const hasVariants = Object.keys(stock)
    .some(k => k.includes("اللون") || k.includes("القياس"));

  // 🟢 بدون متغيرات
  if (!hasVariants) {

    const currentQty = Number(stock["إجمالي الكمية"] || 0);

    if (currentQty < qty) {
      scanMsg.textContent = `❌ المخزون غير كافي للمنتج: ${name}`;
      return;
    }

    const newQty = currentQty - qty;

    await update(ref(db, "warehouse/" + key), {
      "stock/إجمالي الكمية": newQty,
      totalQty: newQty,
      lastUpdate: new Date().toISOString()
    });

  } else {

    // 🔵 بمتغيرات
// نبني نفس مفتاح المتغير المخزن في warehouse
const variantKey = variantPart || "";

if (!variantKey) {
  scanMsg.textContent = `❌ المتغير غير محدد للمنتج: ${name}`;
  return;
}

const currentVariantQty = Number(stock[variantKey] || 0);

    if (currentVariantQty < qty) {
      scanMsg.textContent = `❌ المخزون غير كافي للمتغير: ${name}`;
      return;
    }

    const newVariantQty = currentVariantQty - qty;

    const updatedStock = {
      ...stock,
      [variantKey]: newVariantQty
    };

    let total = 0;
    for (const [k, v] of Object.entries(updatedStock)) {
      if (k !== "إجمالي الكمية") {
        total += Number(v) || 0;
      }
    }

    updatedStock["إجمالي الكمية"] = total;

    await update(ref(db, "warehouse/" + key), {
      stock: updatedStock,
      totalQty: total,
      lastUpdate: new Date().toISOString()
    });

  }

  break;
}
  }
}

pendingOut = [];
  scannedShipments.clear();
  renderPendingTable();

  scanMsg.textContent = "✅ تم الخصم بنجاح";
});
 returnBtn.addEventListener("click", async () => {

if (!pendingReturn.length) {
    alert("لا توجد طلبات للإرجاع");
    return;
  }

  scanMsg.textContent = "⏳ جاري إضافة الراجع...";

  const productTotals = new Map();

pendingReturn.forEach(item => {

    const variantText = Object.entries(item.variants || {})
      .map(([k, v]) => `${k} | ${v}`)
      .join(" | ");

    const key = variantText
      ? item.name + " || " + variantText
      : item.name;

    if (!productTotals.has(key)) {
      productTotals.set(key, 0);
    }

    productTotals.set(key, productTotals.get(key) + item.qty);
  });

  const warehouseSnap = await get(child(ref(db), "warehouse"));

  if (!warehouseSnap.exists()) {
    scanMsg.textContent = "❌ لا يوجد مخزن";
    return;
  }

  const warehouseData = warehouseSnap.val();

  for (const [fullKey, qty] of productTotals.entries()) {

    const parts = fullKey.split(" || ");
    const name = parts[0];
    const variantPart = parts.length > 1 ? parts[1] : null;

    for (const [key, item] of Object.entries(warehouseData)) {

      if (key.toLowerCase().trim() === name.toLowerCase().trim()) {

        const stock = item.stock || {};
        const hasVariants = Object.keys(stock)
          .some(k => k.includes("اللون") || k.includes("القياس"));

        // 🟢 بدون متغيرات
        if (!hasVariants) {

          const currentQty = Number(stock["إجمالي الكمية"] || 0);
          const newQty = currentQty + qty;

          await update(ref(db, "warehouse/" + key), {
            "stock/إجمالي الكمية": newQty,
            totalQty: newQty,
            lastUpdate: new Date().toISOString()
          });

        } else {

          const variantKey = variantPart || "";

          if (!variantKey) {
            scanMsg.textContent = `❌ المتغير غير محدد للمنتج: ${name}`;
            return;
          }

          const currentVariantQty = Number(stock[variantKey] || 0);
          const newVariantQty = currentVariantQty + qty;

          const updatedStock = {
            ...stock,
            [variantKey]: newVariantQty
          };

          let total = 0;
          for (const [k, v] of Object.entries(updatedStock)) {
            if (k !== "إجمالي الكمية") {
              total += Number(v) || 0;
            }
          }

          updatedStock["إجمالي الكمية"] = total;

          await update(ref(db, "warehouse/" + key), {
            stock: updatedStock,
            totalQty: total,
            lastUpdate: new Date().toISOString()
          });
        }

        break;
      }
    }
  }
pendingReturn = [];
  scannedShipments.clear();
  renderPendingTable();

  scanMsg.textContent = "✅ تم إضافة الراجع بنجاح";
});
const pdfBtn = document.getElementById("pdfBtn");

pdfBtn.addEventListener("click", generateInventoryPDF);

async function generateInventoryPDF() {

  if (!pendingOut.length && !pendingReturn.length) {
    alert("لا يوجد بيانات للجرد");
    return;
  }

  // 🔹 تحميل خط Tajawal محلياً مثل الفاتورة
  const res = await fetch("Tajawal-Regular.ttf");
  const buffer = await res.arrayBuffer();
  const binary = Array.from(new Uint8Array(buffer))
    .map(b => String.fromCharCode(b))
    .join("");
  const base64 = btoa(binary);

  pdfMake.vfs = { "Tajawal-Regular.ttf": base64 };
  pdfMake.fonts = {
    Tajawal: {
      normal: "Tajawal-Regular.ttf",
      bold: "Tajawal-Regular.ttf",
      italics: "Tajawal-Regular.ttf",
      bolditalics: "Tajawal-Regular.ttf"
    }
  };

  // 🔹 بناء بيانات الجدول
  let body = [
    [
      { text: "الحالة", style: "tableHeader", alignment: "center" },
      { text: "المنتج", style: "tableHeader", alignment: "center" },
      { text: "الكمية", style: "tableHeader", alignment: "center" }
    ]
  ];

  pendingOut.forEach(item => {
    const variant = Object.values(item.variants || {}).join(" / ");
    const name = variant ? item.name + " - " + variant : item.name;
    body.push([
      { text: "طالع", alignment: "center", color: "#043B64" },
      { text: name, alignment: "center" },
      { text: item.qty.toLocaleString("en-US"), alignment: "center", direction:"ltr" }
    ]);
  });

  pendingReturn.forEach(item => {
    const variant = Object.values(item.variants || {}).join(" / ");
    const name = variant ? item.name + " - " + variant : item.name;
    body.push([
      { text: "راجع", alignment: "center", color: "#c0392b" },
      { text: name, alignment: "center" },
      { text: item.qty.toLocaleString("en-US"), alignment: "center", direction:"ltr" }
    ]);
  });

  const docDefinition = {
    pageSize: "A4",
    pageMargins: [40, 50, 40, 50],
    pageDirection: "rtl",

    defaultStyle: {
      font: "Tajawal",
      alignment: "right"
    },

    styles: {
      tableHeader: {
        bold: true,
        color: "white",
        fillColor: "#043B64",
        alignment: "center"
      }
    },

    content: [

      // 🔹 العنوان الرئيسي
      {
        text: "شركة المراد التجارية",
        fontSize: 20,
        bold: true,
        color: "#FF6B2D",
        alignment: "right",
        margin: [0,0,0,10]
      },

      {
        text: "تقرير الجرد اليومي",
        fontSize: 14,
        bold: true,
        alignment: "center",
        color: "#043B64",
        margin: [0,0,0,15]
      },

      {
        text: "تاريخ الجرد: " + new Date().toLocaleString("en-GB"),
        alignment: "right",
        margin: [0,0,0,10]
      },

      {
        table: {
          headerRows: 1,
          widths: ["auto","*","auto"],
          body: body
        },
        layout: {
          hLineColor: "#ddd",
          vLineColor: "#ddd",
          paddingTop: () => 6,
          paddingBottom: () => 6
        }
      },

      {
        text: "🔹 تقرير صادر من نظام المراد 🔹",
        alignment: "center",
        italics: true,
        color: "#777",
        fontSize: 9,
        margin: [0,15,0,0]
      }
    ]
  };

  pdfMake.createPdf(docDefinition).download("تقرير_الجرد.pdf");
}
  </script>
