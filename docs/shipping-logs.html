function drawBoxWithText(doc, title, text, x, y, width) {
  const padding = 2;
  const lineHeight = 4;

  const lines = doc.splitTextToSize(text || "-", width - padding * 2);
  const boxHeight = lines.length * lineHeight + padding * 2 + 6;

  doc.rect(x, y, width, boxHeight);

  doc.setFontSize(9);
  doc.text(title, x + padding, y + 4);

  doc.setFontSize(8);
  doc.text(lines, x + padding, y + 9);

  return boxHeight;
}

async function findOrder(db, orderId) {
  const statuses = [
    "مثبت", "قيد التجهيز", "قيد التوصيل", "قيد المعالجة",
    "new", "جديد", "تم التسليم", "راجع", "رفض",
    "بانتظار البضاعة", "تم استلام الراجع"
  ];
  for (const status of statuses) {
    const snap = await get(ref(db, `ordersTest/${status}/${orderId}`));
    if (snap.exists()) return snap;
  }
  return { exists: () => false, val: () => null };
}

// ========== 1) طباعة جميع الطلبات في السجل ==========
window.printInvoice = async function (logId) {
  const snap = await get(ref(db, `shippingLogs/${logId}/orders`));

    alert("لا توجد طلبات للطباعة");
    return;
  }

const ordersRefs = Object.values(snap.val());
const orders = [];

for (const o of ordersRefs) {
const fullSnap = await findOrder(db, o.orderId);
  if (fullSnap.exists()) {
    const fullOrder = fullSnap.val();
    fullOrder.id = o.orderId;
    fullOrder.receiptNum = o.receiptNum;
    orders.push(fullOrder);
  }
}
  const { jsPDF } = window.jspdf;

const doc = new jsPDF({
  unit: "mm",
  format: [80, 120],
  orientation: "portrait",
  compress: true
});

  let firstPage = true;

    // تهيئة

    // QR واحد لكل وصل
    const qrBase64 = await generateQRBase64(order.receiptNum);

    await drawReceipt(doc, order, muradLogo, waseetLogo, qrBase64);
  }

  doc.save(`All_Receipts_${logId}.pdf`);
};

async function convertToBase64(url) {
  const blob = await fetch(url).then(r => r.blob());
  return await new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}


// 🔥 دالة إنشاء QR Base64 (خفيفة + محلية)
function generateQRBase64(text) {
  const qr = qrcode(0, 'L'); // أخف مستوى
  qr.addData(text || "");
  qr.make();
  return qr.createDataURL(2); // واضح + خفيف
}
