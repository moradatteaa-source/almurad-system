<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>الطلبات - نظام المراد</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/ar.js"></script>
  <style>
    :root {
      --navy: #043B64;
      --navy-dark: #032a47;
      --navy-light: #085694;
      --orange: #FF6B2D;
      --orange-dark: #e55a2b;
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e8eaed;
      --text: #1a2332;
      --text-muted: #7a8694;
      --green: #27ae60;
      --red: #e74c3c;
      --yellow: #f39c12;
      --r: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.11);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
      --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-top: 56px;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; right: 0; left: 0; z-index: 900;
      height: 56px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      box-shadow: 0 2px 16px rgba(4,59,100,0.25);
    }
    .header-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 16px; font-weight: 700; text-align: center;
      max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .header-left, .header-right { display: flex; align-items: center; gap: 4px; }
    .hbtn {
      width: 38px; height: 38px; border-radius: 50%; background: transparent;
      border: none; color: white; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 20px; transition: var(--transition);
    }
    .hbtn:hover { background: rgba(255,255,255,0.15); }
    .hbtn.active { background: rgba(255,107,45,0.3); color: #FF6B2D; }
    .hbtn svg { pointer-events: none; }

    /* ── MENU ── */
    .menu-popup {
      display: none; position: fixed; top: 60px; left: 10px;
      background: var(--card); border-radius: 12px;
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      overflow: hidden; z-index: 950; min-width: 190px;
      animation: slideDown 0.18s ease;
    }
    .menu-popup.open { display: block; }
    .menu-item {
      padding: 13px 16px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 10px;
      color: var(--text); border-bottom: 1px solid var(--border);
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f4f7fb; color: var(--navy); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 9px;
      border-radius: 20px; font-size: 11px; font-weight: 600; color: white;
      white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.12); letter-spacing: 0.2px;
    }
    .b-new       { background: linear-gradient(135deg, #4FA3FF, #3498db); }
    .b-mothabet  { background: linear-gradient(135deg, #1abc9c, #16a085); }
    .b-process   { background: linear-gradient(135deg, #e67e22, #d35400); }
    .b-prepare   { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .b-wait      { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
    .b-deliver   { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #2c3e50 !important; }
    .b-delivered { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .b-return    { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .b-retrecv   { background: linear-gradient(135deg, #c0392b, #a93226); }
    .b-reject    { background: #7f8c8d; }
    .b-default   { background: #95a5a6; }

    /* ── CONTROLS ── */
    .controls {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      padding: 10px 12px; background: var(--card);
      margin: 10px 10px 0; border-radius: var(--r); box-shadow: var(--shadow);
    }
    .stats-bar {
      text-align: center; margin: 8px 10px 0;
      background: linear-gradient(135deg, #e8f4fb, #d6eaf8);
      border-radius: var(--r); padding: 10px;
      font-size: 14px; font-weight: 700; color: var(--navy);
      box-shadow: var(--shadow);
    }

    /* ── FILTER NOTICE ── */
    .filter-notice {
      display: none; margin: 6px 10px 0;
      background: linear-gradient(135deg, #fff3cd, #ffeaa7);
      border: 1px solid #f39c12; border-radius: 10px;
      padding: 8px 14px; font-size: 12px; font-weight: 600; color: #856404;
      text-align: center;
    }
    .filter-notice.show { display: block; }

    /* ── CARDS ── */
    #ordersList { padding: 10px 10px 0; }
    .order-card {
      background: var(--card); border-radius: var(--r);
      padding: 14px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: flex-start;
      box-shadow: var(--shadow); cursor: pointer; transition: var(--transition);
      border: 2px solid transparent; position: relative; overflow: hidden;
    }
    .order-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 3px; height: 100%; background: var(--navy);
      transform: scaleY(0); transition: transform 0.2s; transform-origin: top;
    }
    .order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .order-card:hover::after { transform: scaleY(1); }
    .order-card:active { transform: scale(0.99); }
    .order-card.selected {
      background: linear-gradient(135deg, #e8f8f0, #c8edd8) !important;
      border-color: var(--green) !important;
    }
    .order-card.selected::after { background: var(--green); transform: scaleY(1); }
    .order-card.danger { border-color: var(--red); background: rgba(231,76,60,0.04); }
    .order-card.danger::after { background: var(--red); transform: scaleY(1); }
    @keyframes pulse {
      0%,100% { box-shadow: var(--shadow); }
      50% { box-shadow: 0 4px 20px rgba(231,76,60,0.28); }
    }
    .order-card.danger { animation: pulse 2.2s infinite; }

    .card-right { flex: 1; min-width: 0; }
    .card-left { flex-shrink: 0; margin-right: 12px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .card-date { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 3px; }
    .card-id { font-size: 15px; color: var(--navy); font-weight: 800; }
    .card-product { color: var(--orange); font-size: 13px; font-weight: 600; margin: 3px 0; }
    .card-fixer { font-size: 11px; color: var(--green); font-weight: 600; }
    .card-qty { font-size: 12px; color: var(--text); font-weight: 600; background: #f0f2f5; padding: 3px 9px; border-radius: 12px; }
    .card-price { font-size: 14px; color: var(--text); font-weight: 700; }
    .card-adv { font-size: 11px; color: var(--text-muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-timer { font-size: 10px; font-weight: 700; }

    /* ── BUTTONS ── */
    .btn {
      padding: 10px 16px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: var(--transition); display: inline-flex; align-items: center;
      gap: 6px; justify-content: center; min-width: 110px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-navy { background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: white; }
    .btn-navy:hover { box-shadow: 0 4px 14px rgba(4,59,100,0.3); transform: translateY(-1px); }
    .btn-green { background: linear-gradient(135deg, var(--green), #219653); color: white; }
    .btn-green:hover { box-shadow: 0 4px 14px rgba(39,174,96,0.3); transform: translateY(-1px); }
    .btn-red { background: linear-gradient(135deg, var(--red), #c0392b); color: white; }
    .btn-red:hover { box-shadow: 0 4px 14px rgba(231,76,60,0.3); transform: translateY(-1px); }
    .btn-ghost { background: white; color: var(--navy); border: 2px solid var(--border); }
    .btn-ghost:hover { border-color: var(--navy); background: #f4f7fb; }

    /* ── SELECTION ── */
    .sel-info {
      text-align: center; font-size: 13px; margin: 6px 10px 0;
      color: var(--red); font-weight: 600; background: #fff5f5;
      padding: 8px; border-radius: 10px; display: none;
    }
    .bulk-box {
      text-align: center; padding: 12px; background: var(--card);
      border-radius: var(--r); margin: 8px 10px; display: none;
      box-shadow: var(--shadow);
    }
    .bulk-select {
      padding: 10px 14px; border-radius: 10px; border: 2px solid var(--border);
      font-size: 14px; color: var(--text); background: white;
      min-width: 200px; cursor: pointer; outline: none;
    }
    .bulk-select:focus { border-color: var(--navy); }

    /* ── LOADER ── */
    #loader {
      text-align: center; padding: 20px; color: var(--navy);
      font-weight: 600; font-size: 14px; display: none;
    }
    .spinner-inline {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid var(--border); border-top-color: var(--orange);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FULL SCREEN LOADER (when loading all for filter) ── */
    #fullLoader {
      display: none; position: fixed; inset: 0; z-index: 9998;
      background: rgba(4,59,100,0.85); flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #fullLoader.show { display: flex; }
    .full-spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: var(--orange);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #fullLoader p { color: white; font-size: 15px; font-weight: 600; }

    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); display: none; }
    .empty-state svg { width: 72px; height: 72px; margin-bottom: 14px; opacity: 0.5; }
    .empty-state p { font-size: 15px; font-weight: 500; }
    .end-message {
      text-align: center; padding: 20px; font-size: 13px;
      color: var(--text-muted); display: none; font-weight: 500;
    }
    #scrollSentinel { height: 1px; }

    /* ── OVERLAY PANELS ── */
    .overlay-panel {
      display: none; position: fixed; top: 60px; left: 12px; right: 12px;
      z-index: 890; background: var(--card); border-radius: var(--r);
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      max-height: 48vh; overflow-y: auto; animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .overlay-panel.open { display: block; }
    .panel-inner { padding: 16px; }

    /* ── SEARCH ── */
    .search-types { display: flex; gap: 6px; margin: 12px 0; }
    .stype-btn {
      flex: 1; padding: 9px 4px; border-radius: 9px;
      border: 2px solid var(--border); background: white;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: var(--transition); text-align: center;
    }
    .stype-btn.active {
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      color: white; border-color: var(--navy);
      box-shadow: 0 3px 10px rgba(4,59,100,0.2);
    }
    .global-search-note {
      font-size: 11px; color: var(--orange); font-weight: 600;
      text-align: center; margin-bottom: 10px; padding: 6px 10px;
      background: rgba(255,107,45,0.08); border-radius: 8px;
    }

    /* ── FILTER ── */
    .filter-section-title {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; padding: 0 2px;
    }
    .acc-head {
      padding: 11px 14px; background: #f4f7fb; border-radius: 10px;
      cursor: pointer; font-weight: 600; color: var(--navy); font-size: 14px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.2s; user-select: none;
    }
    .acc-head:hover { background: #e8f1f8; }
    .acc-head::after { content: '▾'; font-size: 12px; transition: transform 0.25s; }
    .acc-head.open::after { transform: rotate(180deg); }
    .acc-body { display: none; padding: 10px 4px; animation: slideDown 0.2s ease; }
    .filter-list {
      max-height: 150px; overflow-y: auto; border: 1px solid var(--border);
      padding: 6px; border-radius: 10px; background: #fafbfc;
    }
    .filter-list label {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: background 0.15s;
    }
    .filter-list label:hover { background: #e8f1f8; }
    .filter-list input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--navy); flex-shrink: 0; }

    .inp {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 2px solid var(--border); border-radius: 10px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: #fafbfc; color: var(--text);
    }
    .inp:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(4,59,100,0.1); background: white; }

    /* ── FAB ── */
    #fab {
      position: fixed; bottom: 22px; left: 22px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white; font-size: 34px; font-weight: 300;
      border: none; cursor: pointer; z-index: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(255,107,45,0.45);
      transition: var(--transition);
    }
    #fab:hover { transform: scale(1.1) rotate(8deg); box-shadow: 0 8px 28px rgba(255,107,45,0.6); }
    #fab:active { transform: scale(0.95); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: var(--navy); color: white; padding: 11px 22px;
      border-radius: 30px; font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: all 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
      z-index: 9999; box-shadow: var(--shadow-lg);
      max-width: 90%; text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); }
    #toast.error   { background: var(--red); }
    #toast.warning { background: var(--yellow); color: #2c3e50; }

    .divider { height: 1px; background: var(--border); margin: 0; }
    .gap8 { gap: 8px; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .row { display: flex; gap: 8px; }

    @media (max-width: 480px) {
      .header-center { font-size: 14px; }
      .btn { min-width: 90px; padding: 9px 12px; font-size: 12px; }
      .order-card { padding: 12px; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #bbb; }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header class="header">
  <div class="header-right">
    <button class="hbtn" id="backBtn" title="رجوع">&#10094;</button>
    <button class="hbtn" id="menuBtn" title="القائمة">&#8942;</button>
  </div>
  <div class="header-center" id="titleText">الطلبات</div>
  <div class="header-left">
    <button class="hbtn" id="searchBtn" title="بحث">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button class="hbtn" id="filterBtn" title="تصفية">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 4 21 4 14 12 14 20 10 20 10 12 3 4"/>
      </svg>
    </button>
  </div>
</header>

<!-- ─── MENU ─── -->
<div id="menuPopup" class="menu-popup">
  <div class="menu-item" id="menuWaseet">📦 رفع الطلبات للشحن</div>
  <div class="menu-item" id="menuLogs">📋 سجل الشحنات</div>
  <div class="menu-item" id="menuRefresh">🔄 تحديث البيانات</div>
</div>

<!-- ─── SEARCH PANEL ─── -->
<div id="searchPanel" class="overlay-panel">
  <div class="panel-inner">
    <div class="global-search-note">🌐 البحث يشمل جميع الحالات</div>
    <input id="searchInput" type="text" class="inp" placeholder="اكتب للبحث..." autocomplete="off">
    <div class="search-types">
      <button class="stype-btn active" data-type="orderId">🔢 رقم</button>
      <button class="stype-btn" data-type="phone">📱 هاتف</button>
      <button class="stype-btn" data-type="receiptNum">🧾 وصل</button>
    </div>
    <div class="row">
      <button id="doSearch" class="btn btn-navy" style="flex:1">🔍 بحث</button>
      <button id="cancelSearch" class="btn btn-ghost" style="flex:1">✕ إلغاء</button>
    </div>
  </div>
</div>

<!-- ─── FILTER PANEL ─── -->
<div id="filterPanel" class="overlay-panel">
  <div class="panel-inner">

    <div id="accProdHead" class="acc-head">🛒 تصفية حسب المنتج</div>
    <div id="accProdBody" class="acc-body">
      <input id="prodSearch" type="text" class="inp" placeholder="🔍 بحث منتج..." style="margin-bottom:8px">
      <label class="flex-center gap8" style="margin-bottom:6px;font-size:13px">
        <input type="checkbox" id="prodAll" style="width:16px;height:16px;accent-color:var(--navy)">
        تحديد الكل
      </label>
      <div id="prodList" class="filter-list">
        <div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">
          جاري التحميل...
        </div>
      </div>
    </div>

    <div id="accAdvHead" class="acc-head mt8">🏢 تصفية حسب المعلن</div>
    <div id="accAdvBody" class="acc-body">
      <input id="advSearch" type="text" class="inp" placeholder="🔍 بحث معلن..." style="margin-bottom:8px">
      <label class="flex-center gap8" style="margin-bottom:6px;font-size:13px">
        <input type="checkbox" id="advAll" style="width:16px;height:16px;accent-color:var(--navy)">
        تحديد الكل
      </label>
      <div id="advList" class="filter-list">
        <div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">
          جاري التحميل...
        </div>
      </div>
    </div>

    <div class="mt12">
      <div class="filter-section-title">📅 تصفية حسب التاريخ</div>
      <input id="dateRange" type="text" class="inp" placeholder="اختر الفترة الزمنية" style="text-align:center">
    </div>

    <div class="row mt12">
      <button id="applyFilter" class="btn btn-navy" style="flex:1">✅ تطبيق</button>
      <button id="clearFilter" class="btn btn-ghost" style="flex:1">🗑️ مسح</button>
    </div>
  </div>
</div>

<!-- ─── CONTROLS ─── -->
<div class="controls">
  <button id="selectModeBtn" class="btn btn-ghost">✏️ تحديد الطلبات</button>
  <button id="selectAllBtn" class="btn btn-green">✓ تحديد الكل</button>
</div>

<div id="filterNotice" class="filter-notice"></div>
<div id="selInfo" class="sel-info"></div>

<div id="bulkBox" class="bulk-box">
  <select id="bulkStatus" class="bulk-select">
    <option value="">اختر الحالة الجديدة</option>
    <option value="مثبت">✅ مثبت</option>
    <option value="قيد المعالجة">⚙️ قيد المعالجة</option>
    <option value="قيد التجهيز">📦 قيد التجهيز</option>
    <option value="بانتظار البضاعة">🚚 بانتظار البضاعة</option>
    <option value="قيد التوصيل">🛵 قيد التوصيل</option>
    <option value="تم التسليم">🎯 تم التسليم</option>
    <option value="راجع">↩️ راجع</option>
    <option value="تم استلام الراجع">📥 تم استلام الراجع</option>
    <option value="رفض">❌ رفض</option>
  </select>

// ════════════════════════════════════════════════════════

const PAGE_SIZE = 30;

// TTL للكاش العادي (pagination) = 5 دقائق
// TTL للكاش الكامل (للفلترة)   = 10 دقائق
const CACHE_TTL_PAGE = 5  * 60 * 1000;
const CACHE_TTL_FULL = 10 * 60 * 1000;

const ALL_STATUSES = [
  'تم التسليم','قيد المعالجة','جديد','مثبت',
  'قيد التجهيز','بانتظار البضاعة','قيد التوصيل',

];

  "تم استلام الراجع": "b-retrecv",
  "رفض":              "b-reject"
};

// ════════════════════════════════════════════════════════
// 🗄️ Cache Manager
// يدير نوعين من الكاش:
//   "page"  → أول PAGE_SIZE طلبات (للعرض العادي)
//   "full"  → كل الطلبات (للفلترة)
// ════════════════════════════════════════════════════════
const Cache = (() => {
  /*
    pageCache[path] = {
      data: Map<id, order>,
      lastCursor: number|null,
      allLoaded: bool,
      ts: number
    }
    fullCache[path] = {
      data: Map<id, order>,  ← كل الطلبات غير المحذوفة
      ts: number
    }
  */
  const pageCache = new Map();
  const fullCache = new Map();

  return {
    // ── PAGE cache ──
    pageValid(path) {
      const c = pageCache.get(path);
      return c && (Date.now() - c.ts) < CACHE_TTL_PAGE;
    },
    pageGet(path) { return pageCache.get(path) || null; },
    pageSet(path, ordersMap, lastCursor, allLoaded) {
      const existing = pageCache.get(path) || { data: new Map() };
      ordersMap.forEach((v, k) => existing.data.set(k, v));
      pageCache.set(path, { data: existing.data, lastCursor, allLoaded, ts: Date.now() });
    },
    pageInvalidate(path) { pageCache.delete(path); },

    // ── FULL cache ──
    fullValid(path) {
      const c = fullCache.get(path);
      return c && (Date.now() - c.ts) < CACHE_TTL_FULL;
    },
    fullGet(path) { return fullCache.get(path) || null; },
    fullSet(path, ordersMap) {
      fullCache.set(path, { data: ordersMap, ts: Date.now() });
    },
    fullInvalidate(path) { fullCache.delete(path); },

    // ── Shared helpers ──
    // حدّث أو احذف طلب في كلا الكاشين
    updateOrder(path, id, updatedOrder) {
      [pageCache, fullCache].forEach(c => {
        const entry = c.get(path);
        if (!entry) return;
        if (updatedOrder === null) entry.data.delete(id);
        else entry.data.set(id, updatedOrder);
      });
    },
    // انقل طلب من مسار لآخر في كلا الكاشين
    moveOrder(fromPath, toPath, id, orderData) {
      [pageCache, fullCache].forEach(c => {
        const from = c.get(fromPath);
        if (from) from.data.delete(id);
        const to = c.get(toPath);
        if (to) to.data.set(id, orderData);
      });
    },
    // أبطل كل الكاش (عند refresh يدوي)
    invalidateAll() { pageCache.clear(); fullCache.clear(); },
    invalidatePath(path) { pageCache.delete(path); fullCache.delete(path); },
  };
})();

// ════════════════════════════════════════════════════════
// 🔒 Request Deduplicator
// ════════════════════════════════════════════════════════
const inflight = new Map();
async function dedupGet(key, fn) {
  if (inflight.has(key)) return inflight.get(key);
  const p = fn().finally(() => inflight.delete(key));
  inflight.set(key, p);
  return p;
}

// ════════════════════════════════════════════════════════
// 📋 App State
// ════════════════════════════════════════════════════════
const filterStatus = new URLSearchParams(location.search).get("status") || "جديد";
const dataPath     = `ordersTest/${filterStatus}`;
localStorage.setItem("currentFilterStatus", filterStatus);

const S = {
  masterOrders:   [],          // الطلبات المعروضة حالياً (pagination أو full)
  allOrders:      [],          // كل الطلبات عند تفعيل الفلترة
  visibleOrders:  [],          // بعد تطبيق الفلاتر
  selectedOrders: new Set(),
  selectionMode:  false,
  filterActive:   false,
  fullLoaded:     false,       // هل تم جلب كل الطلبات للفلترة؟
  selectedDates:  [],
  searchType:     "orderId",
  isLoading:      false,
  isLoadingMore:  false,
  allPageLoaded:  false,       // هل انتهى pagination؟
  lastCursor:     null,
  isSearchMode:   false,
};

// ════════════════════════════════════════════════════════
// 🛠️ Helpers
// ════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = "info", dur = 2800) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), dur);
}

function showLoader(v) {
  document.getElementById("loader").style.display = v ? "block" : "none";
}

function showFullLoader(v, msg = "جاري تحميل جميع الطلبات للفلترة...") {
  const el = document.getElementById("fullLoader");
  document.getElementById("fullLoaderMsg").textContent = msg;
  el.classList.toggle("show", v);
}

function updateStats(n, filtered = false) {
  const bar = document.getElementById("statsBar");
  bar.textContent = filtered ? `🔍 ${n} طلب (نتائج الفلتر)` : `📊 ${n} طلب`;
}

function normalizeNum(s) {
  if (!s) return "";
  const ar = "٠١٢٣٤٥٦٧٨٩", en = "0123456789";
  return String(s).split("").map(c => { const i = ar.indexOf(c); return i >= 0 ? en[i] : c; }).join("");
}

function formatDate(t) {
  if (!t) return "";
  return new Date(t).toLocaleString("ar-EG", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit"
  });
}

function getStatusTime(order) {
  return order?.statusHistory?.[encodeURIComponent(order.status)]?.time
    || order?.statusHistory?.[order.status]?.time
    || order?.createdAt
    || order?.updatedAt
    || "";
}

function getTimerText(order) {
  if (order.status !== "قيد المعالجة") return "";
  const t = getStatusTime(order);
  if (!t) return "";
  const days = Math.floor((Date.now() - new Date(t)) / 86400000);
  const left  = 3 - days;
  if (left >= 3) return '<span class="card-timer" style="color:#27ae60">⏰ متبقي 3 أيام</span>';
  if (left === 2) return '<span class="card-timer" style="color:#f39c12">⏰ متبقي يومان</span>';
  if (left === 1) return '<span class="card-timer" style="color:#e67e22">⚠️ متبقي يوم</span>';
  return '<span class="card-timer" style="color:#e74c3c">🔴 متأخر</span>';
}

function isDanger(order) {
  if (order.status !== "قيد المعالجة") return false;
  const t = getStatusTime(order);
  return t && Math.floor((Date.now() - new Date(t)) / 86400000) >= 3;
}

function getLoggedUser() {
  return JSON.parse(localStorage.getItem("loggedInUser") || "{}").username || "system";
}

// ════════════════════════════════════════════════════════
// 🃏 Build Card
// ════════════════════════════════════════════════════════
function buildCard(order) {
  const div = document.createElement("div");
  const classes = ["order-card"];
  if (isDanger(order)) classes.push("danger");
  if (S.selectedOrders.has(order.id)) classes.push("selected");
  div.className = classes.join(" ");
  div.dataset.id = order.id;

  const badgeClass = BADGE_CLASS[order.status] || "b-default";
  div.innerHTML = `
    <div class="card-right">
      <div class="card-date">🕐 ${formatDate(getStatusTime(order))}</div>
      <div class="flex-center gap8" style="flex-wrap:wrap;margin:2px 0">
        <span class="card-id">#${order.id}</span>
        <span class="card-product">${order.productName || "بدون اسم"}</span>
      </div>
      ${order.fixedBy ? `<div class="card-fixer" style="margin-top:3px">📌 ثبت بواسطة: ${order.fixedBy}</div>` : ""}
    </div>
    <div class="card-left">
      <span class="card-qty">📦 ${order.totalQty || order.quantity || 1}</span>
      <span class="card-price">💰 ${Number(order.totalPrice || order.price || 0).toLocaleString("en-US")} د.ع</span>
      <div class="card-adv">🏢 ${order.advertiser || "غير محدد"}</div>
      ${getTimerText(order)}
      <span class="badge ${badgeClass}">${order.status || "جديد"}</span>
    </div>
  `;

  div.addEventListener("click", () => {
    if (S.selectionMode) { toggleSelect(order.id, div); return; }
    localStorage.setItem("selectedOrder", order.id);
    localStorage.setItem("previousScrollPosition", window.scrollY);
    window.location.href = "order-details.html";
  });

  return div;
}

function toggleSelect(id, card) {
  if (S.selectedOrders.has(id)) {
    S.selectedOrders.delete(id);
    card.classList.remove("selected");
  } else {
    S.selectedOrders.add(id);
    card.classList.add("selected");
  }
  const el = document.getElementById("selInfo");
  el.style.display = "block";
  el.textContent = `✅ المحدد: ${S.selectedOrders.size} طلب`;
}

// ════════════════════════════════════════════════════════
// 📄 Render
// ════════════════════════════════════════════════════════
function renderOrders(list, append = false) {
  if (!append) {
    S.visibleOrders = list;
  } else {
    const existingIds = new Set(S.visibleOrders.map(o => o.id));
    const newItems = list.filter(o => !existingIds.has(o.id));
    S.visibleOrders = [...S.visibleOrders, ...newItems];
    list = newItems;
  }

  const isFiltered = S.filterActive;
  updateStats(S.visibleOrders.length, isFiltered);
  document.getElementById("emptyState").style.display = "";
  document.getElementById("endMessage").style.display = "";

  const container = document.getElementById("ordersList");
  if (!append) container.innerHTML = "";

  if (S.visibleOrders.length === 0) {
    document.getElementById("emptyState").style.display = "block";
    return;
  }

  const frag = document.createDocumentFragment();
  list.forEach(order => {
    frag.appendChild(buildCard(order));
    const d = document.createElement("div");
    d.className = "divider";
    frag.appendChild(d);
  });
  container.appendChild(frag);
}

function showEndMessage() {
  document.getElementById("endMessage").style.display = "block";
}

function updateFilterNotice() {
  const el = document.getElementById("filterNotice");
  if (S.filterActive) {
    el.textContent = "⚠️ الفلتر نشط — النتائج تشمل جميع الطلبات في هذه الحالة";
    el.classList.add("show");
  } else {
    el.classList.remove("show");
  }
}

// ════════════════════════════════════════════════════════
// 🔥 Load first page (pagination)
// ════════════════════════════════════════════════════════
async function loadOrders(forceRefresh = false) {
  if (S.isLoading) return;
  S.isLoading     = true;
  S.masterOrders  = [];
  S.visibleOrders = [];
  S.allPageLoaded = false;
  S.lastCursor    = null;
  document.getElementById("ordersList").innerHTML = "";
  document.getElementById("endMessage").style.display = "";
  showLoader(true);

  // ── من الكاش أولاً ──
  if (!forceRefresh && Cache.pageValid(dataPath)) {
    const c      = Cache.pageGet(dataPath);
    const orders = Array.from(c.data.values())
      .filter(o => !o.isDeleted)
      .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));

    S.masterOrders  = orders;
    S.lastCursor    = c.lastCursor;
    S.allPageLoaded = c.allLoaded;
    S.isLoading     = false;
    showLoader(false);

    if (S.filterActive) {
      await ensureAllLoaded();  // تأكد من وجود كل الطلبات للفلترة
    } else {
      renderOrders(orders);
      if (S.allPageLoaded) showEndMessage();
    }
    return;
  }

  // ── من Firebase ──
  try {
    if (forceRefresh) Cache.invalidatePath(dataPath);

    const snap = await dedupGet(`load:${dataPath}`, () =>
      get(query(ref(db, dataPath), orderByChild("enterIndex"), limitToLast(PAGE_SIZE)))
    );

    if (!snap.exists()) {
      renderOrders([]);
      S.allPageLoaded = true;
      Cache.pageSet(dataPath, new Map(), null, true);
      showEndMessage();
      return;
    }

    const ordersMap = new Map();
    Object.entries(snap.val()).forEach(([id, o]) => {
      if (!o.isDeleted) ordersMap.set(id, { id, ...o });
    });

    const sorted = Array.from(ordersMap.values())
      .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));

    const lastCursor = sorted.length > 0
      ? Math.min(...sorted.map(o => o.enterIndex || 0)) - 1
      : null;
    const allLoaded = sorted.length < PAGE_SIZE;

    Cache.pageSet(dataPath, ordersMap, lastCursor, allLoaded);

    S.masterOrders  = sorted;
    S.lastCursor    = lastCursor;
    S.allPageLoaded = allLoaded;

    if (S.filterActive) {
      await ensureAllLoaded();
    } else {
      renderOrders(sorted);
      if (S.allPageLoaded) showEndMessage();
    }

  } catch (err) {
    console.error("loadOrders:", err);
    showToast("❌ فشل التحميل", "error");
  } finally {
    S.isLoading = false;
    showLoader(false);
  }
}

// ════════════════════════════════════════════════════════
// 📦 ensureAllLoaded
// يجلب كل طلبات الحالة الحالية مرة واحدة من Firebase
// ويخزنها في fullCache — لا يُعيد الجلب إذا كان الكاش صالحاً
// ════════════════════════════════════════════════════════
async function ensureAllLoaded() {
  // إذا الكاش الكامل موجود وصالح → استخدمه مباشرة
  if (Cache.fullValid(dataPath)) {
    const c = Cache.fullGet(dataPath);
    S.allOrders  = Array.from(c.data.values())
      .filter(o => !o.isDeleted)
      .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));
    S.fullLoaded = true;
    applyFiltersAndRender();
    return;
  }

  // لم يُجلب بعد → اجلب الكل من Firebase
  showFullLoader(true);
  try {
    const snap = await dedupGet(`full:${dataPath}`, () => get(ref(db, dataPath)));

    const ordersMap = new Map();
    if (snap && snap.exists()) {
      Object.entries(snap.val()).forEach(([id, o]) => {
        if (!o.isDeleted) ordersMap.set(id, { id, ...o });
      });
    }

    Cache.fullSet(dataPath, ordersMap);

    // حدّث أيضاً pageCache بكل البيانات حتى نوفر قراءات مستقبلية
    Cache.pageSet(dataPath, ordersMap, null, true);

    S.allOrders     = Array.from(ordersMap.values())
      .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));
    S.masterOrders  = S.allOrders;
    S.allPageLoaded = true;
    S.fullLoaded    = true;

    applyFiltersAndRender();

  } catch (err) {
    console.error("ensureAllLoaded:", err);
    showToast("❌ فشل تحميل جميع الطلبات", "error");
  } finally {
    showFullLoader(false);
  }
}

// ════════════════════════════════════════════════════════
// ⬇️ Load More (Infinite Scroll — للوضع العادي فقط)
// ════════════════════════════════════════════════════════
async function loadMore() {
  // لا تحمّل المزيد في حالة البحث أو الفلترة (لأننا نملك الكل بالفعل)
  if (S.isLoadingMore || S.allPageLoaded || S.lastCursor === null) return;
  if (S.isSearchMode || S.filterActive) return;
  S.isLoadingMore = true;
  showLoader(true);

  try {
    const snap = await dedupGet(`more:${dataPath}:${S.lastCursor}`, () =>
      get(query(ref(db, dataPath), orderByChild("enterIndex"), endAt(S.lastCursor), limitToLast(PAGE_SIZE)))
    );

    if (!snap.exists()) {
      S.allPageLoaded = true;
      showEndMessage();
      return;
    }

    const newMap      = new Map();
    const existingIds = new Set(S.masterOrders.map(o => o.id));

    Object.entries(snap.val()).forEach(([id, o]) => {
      if (!o.isDeleted && !existingIds.has(id))
        newMap.set(id, { id, ...o });
    });

    if (newMap.size === 0) {
      S.allPageLoaded = true;
      showEndMessage();
      return;
    }

    const newOrders  = Array.from(newMap.values())
      .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));
    const newCursor  = Math.min(...newOrders.map(o => o.enterIndex || 0)) - 1;
    S.allPageLoaded  = newOrders.length < PAGE_SIZE;
    S.lastCursor     = newCursor;

    Cache.pageSet(dataPath, newMap, newCursor, S.allPageLoaded);
    S.masterOrders = [...S.masterOrders, ...newOrders];
    renderOrders(newOrders, true);
    if (S.allPageLoaded) showEndMessage();

  } catch (err) {
    console.error("loadMore:", err);
    showToast("⚠️ فشل تحميل المزيد", "error");
  } finally {
    S.isLoadingMore = false;
    showLoader(false);
  }
}

// ════════════════════════════════════════════════════════
// 🎛️ Apply Filters & Render
// يعمل على S.allOrders (كل الطلبات) عند الفلترة
// ════════════════════════════════════════════════════════
function applyFiltersAndRender() {
  if (S.isSearchMode) return;

  // مصدر البيانات: كل الطلبات إذا فلتر نشط، وإلا masterOrders فقط
  let list = S.filterActive ? [...S.allOrders] : [...S.masterOrders];

  if (S.filterActive) {
    const fp = JSON.parse(localStorage.getItem("filterProducts")    || "[]");
    const fa = JSON.parse(localStorage.getItem("filterAdvertisers") || "[]");

    if (fp.length) list = list.filter(o => fp.includes(o.productName));
    if (fa.length) list = list.filter(o => fa.includes(o.advertiser));

    if (S.selectedDates.length >= 1) {
      const from = S.selectedDates[0].toISOString().split("T")[0];
      const to   = (S.selectedDates[1] || S.selectedDates[0]).toISOString().split("T")[0];
      list = list.filter(o => {
        const d = (getStatusTime(o) || "").split("T")[0];
        return d >= from && d <= to;
      });
    }
  }

  renderOrders(list);
  updateFilterNotice();

  // أظهر "تم عرض الكل" دائماً عند الفلترة (لأن الكل محمّل)
  if (S.filterActive || S.allPageLoaded) showEndMessage();
}

// للتوافق مع الاستدعاءات القديمة
const applyAndRender = applyFiltersAndRender;

// ════════════════════════════════════════════════════════
// 🌐 Global Search (all statuses)
// ════════════════════════════════════════════════════════
async function globalSearch(queryText) {
  if (!queryText) { showToast("⚠️ اكتب نصاً للبحث", "error"); return; }

  S.isSearchMode = true;
  showLoader(true);
  document.getElementById("ordersList").innerHTML = "";
  document.getElementById("endMessage").style.display = "";
  document.getElementById("emptyState").style.display = "";

  const normalizedQ = normalizeNum(queryText.toLowerCase());
  let results = [];

  try {
    const fetches = ALL_STATUSES.map(async status => {
      const path = `ordersTest/${status}`;

      // fullCache أولاً، ثم pageCache، ثم Firebase
      if (Cache.fullValid(path)) {
        return Array.from(Cache.fullGet(path).data.values()).filter(o => !o.isDeleted);
      }
      if (Cache.pageValid(path)) {
        return Array.from(Cache.pageGet(path).data.values()).filter(o => !o.isDeleted);
      }

      const snap = await dedupGet(`search:${path}`, () => get(ref(db, path)).catch(() => null));
      if (!snap || !snap.exists()) return [];

      const ordersMap = new Map();
      Object.entries(snap.val()).forEach(([id, o]) => {
        if (!o.isDeleted) ordersMap.set(id, { id, ...o });
      });

      // خزّن في fullCache (لأننا جلبنا الكل)
      Cache.fullSet(path, ordersMap);
      Cache.pageSet(path, ordersMap, null, true);

      return Array.from(ordersMap.values());
    });

    const allBuckets = await Promise.all(fetches);
    const seen       = new Set();

    allBuckets.flat().forEach(order => {
      if (seen.has(order.id)) return;
      seen.add(order.id);

      let match = false;
      switch (S.searchType) {
        case "orderId":
          match = normalizeNum(String(order.id)).includes(normalizedQ); break;
        case "phone":
          match = normalizeNum(String(order.phone1 || "")).includes(normalizedQ) ||
                  normalizeNum(String(order.phone2 || "")).includes(normalizedQ); break;
        case "receiptNum":
          match = normalizeNum(String(order.receiptNum || "")).includes(normalizedQ); break;
      }
      if (match) results.push(order);
    });

    results.sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));
    S.visibleOrders = results;
    updateStats(results.length, false);

    const container = document.getElementById("ordersList");
    container.innerHTML = "";

    if (results.length === 0) {
      document.getElementById("emptyState").style.display = "block";
    } else {
      const frag = document.createDocumentFragment();
      results.forEach(order => {
        frag.appendChild(buildCard(order));
        const d = document.createElement("div"); d.className = "divider";
        frag.appendChild(d);
      });
      container.appendChild(frag);
      showEndMessage();
    }

    localStorage.setItem("activeSearch", JSON.stringify({ type: S.searchType, query: queryText }));
    showToast(`🔍 ${results.length} نتيجة`, results.length > 0 ? "success" : "warning");

  } catch (err) {
    console.error("globalSearch:", err);
    showToast("❌ فشل البحث", "error");
  } finally {
    showLoader(false);
  }
}

function exitSearch() {
  S.isSearchMode = false;
  document.getElementById("searchInput").value = "";
  localStorage.removeItem("activeSearch");
  document.getElementById("searchPanel").classList.remove("open");
  document.getElementById("searchBtn").classList.remove("active");
  applyFiltersAndRender();
  if (!S.filterActive && S.allPageLoaded) showEndMessage();
}

document.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("titleText").textContent =
    `الطلبات - ${STATUS_LABELS[filterStatus] || filterStatus}`;

  const sc = parseInt(localStorage.getItem("previousScrollPosition") || "0");

  if (localStorage.getItem("forceListRefresh") === "true") {
    localStorage.removeItem("forceListRefresh");
    Cache.invalidatePath(dataPath);
  }

  // استعادة حالة الفلتر
  if (localStorage.getItem("filterActive") === "true") {
    S.filterActive = true;
    document.getElementById("filterBtn").classList.add("active");
    updateFilterNotice();
  }

  await loadOrders();

  // استعادة بحث نشط
  const savedSearch = localStorage.getItem("activeSearch");
  if (savedSearch) {
    try {
      const { type, query: q } = JSON.parse(savedSearch);
      S.searchType = type;
      document.querySelectorAll(".stype-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.type === type)
      );
      document.getElementById("searchBtn").classList.add("active");
      await globalSearch(q);
    } catch (_) { localStorage.removeItem("activeSearch"); }
  }

  if (sc > 0) setTimeout(() => window.scrollTo({ top: sc, behavior: "smooth" }), 200);
});

// 🎛️ Filter
// ════════════════════════════════════════════════════════
const filterBtn   = document.getElementById("filterBtn");
const filterPanel = document.getElementById("filterPanel");

// دالة مساعدة: جهّز قوائم المنتجات والمعلنين
// تجلب من fullCache إن وجد، وإلا من pageCache (أسرع من Firebase)
async function populateFilterLists() {
  let source = [];

  if (Cache.fullValid(dataPath)) {
    source = Array.from(Cache.fullGet(dataPath).data.values());
  } else if (Cache.pageValid(dataPath)) {
    source = Array.from(Cache.pageGet(dataPath).data.values());
  } else {
    source = S.masterOrders;
  }

  const savedP = JSON.parse(localStorage.getItem("filterProducts")    || "[]");
  const savedA = JSON.parse(localStorage.getItem("filterAdvertisers") || "[]");

  const prods = [...new Set(source.map(o => o.productName).filter(Boolean))].sort();
  const advs  = [...new Set(source.map(o => o.advertiser).filter(Boolean))].sort();

  document.getElementById("prodList").innerHTML = prods.length
    ? prods.map(p => `
        <label>
          <input type="checkbox" class="pChk" value="${p}" ${savedP.includes(p) ? "checked" : ""}>
          ${p}
        </label>`).join("")
    : '<div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">لا يوجد منتجات</div>';

  document.getElementById("advList").innerHTML = advs.length
    ? advs.map(a => `
        <label>
          <input type="checkbox" class="aChk" value="${a}" ${savedA.includes(a) ? "checked" : ""}>
          ${a}
        </label>`).join("")
    : '<div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">لا يوجد معلنين</div>';
}

filterBtn.addEventListener("click", async () => {
  if (S.filterActive) {
    // إذا الفلتر نشط → امسحه
    document.getElementById("clearFilter").click();
    return;
  }
  const open = filterPanel.classList.toggle("open");
  filterBtn.classList.toggle("active", open);
  if (open) {
    searchPanel.classList.remove("open");
    searchBtn.classList.remove("active");
    await populateFilterLists();
  }
});

function toggleAcc(headId, bodyId) {
  const h = document.getElementById(headId);
  const b = document.getElementById(bodyId);
  const isOpen = b.style.display === "block";
  document.querySelectorAll(".acc-body").forEach(x => x.style.display = "none");
  document.querySelectorAll(".acc-head").forEach(x => x.classList.remove("open"));
  if (!isOpen) { b.style.display = "block"; h.classList.add("open"); }
}
document.getElementById("accProdHead").addEventListener("click", () => toggleAcc("accProdHead","accProdBody"));
document.getElementById("accAdvHead").addEventListener("click",  () => toggleAcc("accAdvHead","accAdvBody"));

function listenFilterSearch(inputId, selector) {
  document.getElementById(inputId).addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(selector).forEach(lbl => {
      lbl.style.display = lbl.textContent.toLowerCase().includes(q) ? "" : "none";
    });
  });
}
listenFilterSearch("prodSearch", "#prodList label");
listenFilterSearch("advSearch",  "#advList label");

document.getElementById("prodAll").addEventListener("change", e =>
  document.querySelectorAll(".pChk").forEach(c => c.checked = e.target.checked));
document.getElementById("advAll").addEventListener("change", e =>
  document.querySelectorAll(".aChk").forEach(c => c.checked = e.target.checked));

document.getElementById("applyFilter").addEventListener("click", async () => {
  const fp = Array.from(document.querySelectorAll(".pChk:checked")).map(e => e.value);
  const fa = Array.from(document.querySelectorAll(".aChk:checked")).map(e => e.value);

  localStorage.setItem("filterProducts",    JSON.stringify(fp));
  localStorage.setItem("filterAdvertisers", JSON.stringify(fa));

  S.filterActive = !!(fp.length || fa.length || S.selectedDates.length);
  localStorage.setItem("filterActive", S.filterActive ? "true" : "false");

  filterBtn.classList.toggle("active", S.filterActive);
  filterPanel.classList.remove("open");

  if (S.filterActive) {
    // جلب كل الطلبات أولاً إن لم يتم بعد
    await ensureAllLoaded();
  } else {
    applyFiltersAndRender();
    showToast("ℹ️ لم يتم تحديد أي فلتر", "warning");
  }
});

document.getElementById("clearFilter").addEventListener("click", () => {
  document.querySelectorAll(".pChk, .aChk").forEach(c => c.checked = false);
  document.getElementById("prodSearch").value = "";
  document.getElementById("advSearch").value  = "";
  try { document.getElementById("dateRange")._flatpickr?.clear(); } catch(_){}
  S.selectedDates = [];
  S.filterActive  = false;
  localStorage.removeItem("filterActive");
  localStorage.removeItem("filterProducts");
  localStorage.removeItem("filterAdvertisers");
  filterBtn.classList.remove("active");
  filterPanel.classList.remove("open");
  updateFilterNotice();
  // العودة للعرض العادي بالـ masterOrders المحفوظة
  renderOrders(S.masterOrders);
  if (S.allPageLoaded) showEndMessage();
  showToast("🗑️ تم مسح الفلاتر", "success");
});

flatpickr("#dateRange", {
  mode: "range", dateFormat: "Y-m-d", locale: "ar",
  onChange: dates => { S.selectedDates = dates; },
  static: true
});

// ✏️ Bulk Selection
// ════════════════════════════════════════════════════════
document.getElementById("selectModeBtn").addEventListener("click", () => {
  S.selectionMode = !S.selectionMode;
  const btn  = document.getElementById("selectModeBtn");
  const bulk = document.getElementById("bulkBox");
  const info = document.getElementById("selInfo");
  if (S.selectionMode) {
    btn.textContent = "✅ إنهاء التحديد";
    btn.classList.replace("btn-ghost", "btn-navy");
    bulk.style.display = "block";
  } else {
    btn.textContent = "✏️ تحديد الطلبات";
    btn.classList.replace("btn-navy", "btn-ghost");
    bulk.style.display = "none";
    info.style.display = "none";
    S.selectedOrders.clear();
    document.querySelectorAll(".order-card.selected").forEach(c => c.classList.remove("selected"));
  }
});

document.getElementById("selectAllBtn").addEventListener("click", () => {
  const allSelected = S.selectedOrders.size === S.visibleOrders.length;
  if (allSelected) {
    S.selectedOrders.clear();
    document.querySelectorAll(".order-card").forEach(c => c.classList.remove("selected"));
  } else {
    S.visibleOrders.forEach(o => S.selectedOrders.add(o.id));
    document.querySelectorAll(".order-card").forEach(c => {
      if (S.selectedOrders.has(c.dataset.id)) c.classList.add("selected");
    });
  }
  const el = document.getElementById("selInfo");
  el.style.display = "block";
  el.textContent = `✅ المحدد: ${S.selectedOrders.size} طلب`;
});

// ════════════════════════════════════════════════════════
// 🗑️ Delete Selected
// ════════════════════════════════════════════════════════
document.getElementById("deleteSelectedBtn").addEventListener("click", async () => {
  if (!S.selectedOrders.size) { showToast("⚠️ لم تختر أي طلب", "error"); return; }
  if (!confirm(`⚠️ حذف ${S.selectedOrders.size} طلب نهائياً؟`)) return;

  showLoader(true);
  const now      = new Date().toISOString();
  const userName = getLoggedUser();

  try {
    const atomicUpdate = {};
    const snapsNeeded  = [];

    for (const id of S.selectedOrders) {
      // ابحث في fullCache ثم pageCache
      const cached = Cache.fullGet(dataPath)?.data.get(id)
                  || Cache.pageGet(dataPath)?.data.get(id);
      if (cached) {
        atomicUpdate[`deletedOrders/${id}`] = {
          ...cached, deletedBy: userName, deletedAt: now, originalPath: dataPath
        };
        atomicUpdate[`${dataPath}/${id}`] = null;
      } else {
        snapsNeeded.push(id);
      }
    }

    if (snapsNeeded.length > 0) {
      const snaps = await Promise.all(snapsNeeded.map(id => get(ref(db, `${dataPath}/${id}`))));
      snaps.forEach((snap, i) => {
        const id = snapsNeeded[i];
        if (snap.exists()) {
          atomicUpdate[`deletedOrders/${id}`] = {
            ...snap.val(), deletedBy: userName, deletedAt: now, originalPath: dataPath
          };
        }
        atomicUpdate[`${dataPath}/${id}`] = null;
      });
    }

    await update(ref(db), atomicUpdate);

    // حدّث الكاش محلياً
    S.selectedOrders.forEach(id => Cache.updateOrder(dataPath, id, null));

    const deletedIds = new Set(S.selectedOrders);
    S.masterOrders = S.masterOrders.filter(o => !deletedIds.has(o.id));
    S.allOrders    = S.allOrders.filter(o => !deletedIds.has(o.id));

    showToast(`✅ تم حذف ${deletedIds.size} طلب`, "success");
    S.selectedOrders.clear();
    applyFiltersAndRender();

  } catch (err) {
    console.error("delete:", err);
    showToast("❌ فشل الحذف", "error");
  } finally {
    showLoader(false);
  }
});

// ════════════════════════════════════════════════════════
// 🔄 Bulk Status Update
// ════════════════════════════════════════════════════════
document.getElementById("bulkUpdateBtn").addEventListener("click", async () => {
  const newStatus = document.getElementById("bulkStatus").value;
  if (!newStatus)             { showToast("⚠️ اختر حالة", "error"); return; }
  if (!S.selectedOrders.size) { showToast("⚠️ اختر طلبات", "error"); return; }
  if (!confirm(`تغيير حالة ${S.selectedOrders.size} طلب إلى "${newStatus}"؟`)) return;

  showLoader(true);
  const now      = new Date().toISOString();
  const userName = getLoggedUser();
  const newPath  = `ordersTest/${newStatus}`;

  try {
    const atomicUpdate = {};

    for (const id of S.selectedOrders) {
      const oldPath = `${dataPath}/${id}`;
      let order = Cache.fullGet(dataPath)?.data.get(id)
               || Cache.pageGet(dataPath)?.data.get(id)
               || null;

      if (!order) {
        const snap = await get(ref(db, oldPath));
        if (!snap.exists()) continue;
        order = snap.val();
      }

      const updatedHistory = {
        ...(order.statusHistory || {}),
        [encodeURIComponent(newStatus)]: { time: now, by: userName }
      };

      const updatedOrder = {
        ...order,
        id,
        status: newStatus,
        updatedAt: now,
        updatedBy: userName,
        // ✅ لا نغير enterIndex إذا الحالة نفسها — نغيره فقط عند تغيير المسار
        enterIndex: newPath !== `${dataPath}` ? Date.now() : (order.enterIndex || Date.now()),
        statusHistory: updatedHistory
      };

      atomicUpdate[`${newPath}/${id}`] = updatedOrder;
      if (newPath !== oldPath) atomicUpdate[oldPath] = null;

      // حدّث الكاش
      Cache.moveOrder(dataPath, newPath, id, updatedOrder);
    }

    await update(ref(db), atomicUpdate);

    const updatedIds = new Set(S.selectedOrders);
    showToast(`✅ تم تحديث ${updatedIds.size} طلب`, "success");
    S.selectedOrders.clear();

    // أعد بناء القوائم من الكاش المحدّث
    const fullC = Cache.fullGet(dataPath);
    const pageC = Cache.pageGet(dataPath);
    const source = fullC || pageC;

    if (source) {
      const sorted = Array.from(source.data.values())
        .filter(o => !o.isDeleted)
        .sort((a, b) => (b.enterIndex || 0) - (a.enterIndex || 0));
      S.masterOrders = sorted;
      S.allOrders    = sorted;
    }

    const savedSearch = localStorage.getItem("activeSearch");
    if (savedSearch) {
      try {
        const { type, query: q } = JSON.parse(savedSearch);
        S.searchType = type;
        await globalSearch(q);
      } catch (_) {}
    } else {
      applyFiltersAndRender();
    }

  } catch (err) {
    console.error("bulkUpdate:", err);
    showToast("❌ فشل التحديث", "error");
  } finally {
    showLoader(false);
  }
});
